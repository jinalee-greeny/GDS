<div id="toolbar"></div>
<div id="app"></div>
<div id="cta-bar"></div>
<style>
/*__STUDIO_CSS__*/
/* ---- Plugin-shell-only rules (inline export toggles + sticky CTA bar) ---- */
.sel-grid {
  display: grid; grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
  gap: 4px 8px; margin-bottom: 10px;
}
.sel-row input[type="checkbox"] { margin: 0; }
#cta-bar {
  position: fixed; left: 0; right: 0; bottom: 0; z-index: 100;
  display: flex; flex-wrap: wrap; align-items: center; gap: 12px;
  padding: 10px 16px; border-top: 1px solid #ddd; background: #fff;
}
#cta-bar .apply-btn { font-weight: 600; padding: 8px 16px; }
#cta-bar .cta-result { font-size: 12px; color: #666; }
.cta-fails { flex-basis: 100%; font-size: 11px; color: #b91c1c; max-height: 80px; overflow-y: auto; }
.cta-fail { white-space: nowrap; }
#app { padding-bottom: 64px; } /* room for the fixed bar */
.sel-row, .wt-row { display: flex; align-items: center; gap: 6px; font-size: 12px; cursor: pointer; }
.export-toggle { display: inline-flex; align-items: center; gap: 3px; font-size: 11px; color: #555; white-space: nowrap; padding-top: 10px; cursor: pointer; }
.export-ind { margin-left: auto; font-size: 11px; line-height: 1; color: var(--accent); }
.export-ind-off { color: var(--muted-2); }
.cat-master { font-weight: 600; margin-bottom: 8px; }
.export-textstyles { margin: 6px 0 12px; padding: 8px 10px; border: 1px dashed var(--border-strong); border-radius: 6px; }
.font-input { width: 100%; box-sizing: border-box; margin-top: 6px; padding: 4px 6px; }
.font-label { display: block; font-size: 12px; margin-top: 8px; }
@media (prefers-color-scheme: dark) {
  #cta-bar { background: #232323; border-color: #3a3a3a; }
  #cta-bar .cta-result { color: #999; }
  .cta-fails { color: #f87171; }
  .export-toggle { color: #aaa; }
  .export-textstyles { border-color: #444; }
}
</style>
<script id="token-core">
/*__TOKEN_CORE__*/
</script>
<script id="studio-ui">
/*__STUDIO_UI__*/
</script>
<script id="figma-map">
/*__FIGMA_MAP__*/
</script>
<script>
// ---- Plugin UI shell: wires core/studio-ui.js createStudio() to this page,
// and owns the export-toggle UI, co-located INSIDE the shared editor's 6
// categories (Color / Typography / Spacing & Sizing / Effects / Motion /
// Layout) via three hooks — moduleExtras (per-module Var/Effect toggle),
// categoryHeaderExtras (per-category master toggle, all/some/none), and
// categoryBodyExtras (the composite Text Styles item under Typography) —
// rather than a separate output panel, plus the sticky bottom "Apply to
// Figma" CTA bar. Mirrors tool/index.template.html's web shell, swapping the
// export/import panel for these inline toggles + an Apply button that
// postMessages to the Figma plugin main thread (code.src.js). ----
(function () {
  'use strict';
  var C = window.TokenCore;
  var FM = window.FigmaMap;
  var store = C.createStore();
  var selection = FM.GROUP_KEYS.slice(); // Variables: default all groups selected
  var targets = { variables: true, textStyles: false, effectStyles: false };
  var textWeights = ['regular']; // Text Styles: which weights to generate
  var fontFamily = 'Pretendard'; // Text Styles: font family for the text nodes

  // ---- Export taxonomy: maps each shared editor category (by the category
  // KEY that core/studio-ui.js passes to the hooks) to its exportable items —
  // variable groups (-> `selection`) and style kinds (-> targets.textStyles /
  // targets.effectStyles). shadow is NOT here: it is exported as an Effect
  // Style via its own module toggle (see moduleExtras), not as a variable.
  var CAT_EXPORT = {
    color: { name: 'Color', vars: ['color'], styles: [] },
    typography: { name: 'Typography', vars: ['fontSize', 'fontFamily', 'fontWeight', 'lineHeight', 'letterSpacing'], styles: ['text'] },
    spacing: { name: 'Spacing & Sizing', vars: ['space', 'radius', 'borderWidth'], styles: [] },
    effects: { name: 'Effects', vars: ['opacity'], styles: ['effect'] },
    motion: { name: 'Motion', vars: ['duration', 'easing'], styles: [] },
    layout: { name: 'Layout', vars: ['zIndex', 'breakpoint'], styles: [] }
  };

  // Leaf state helpers over `selection` (variable groups) and
  // `targets.{textStyles,effectStyles}` (style kinds).
  function varOn(g) { return selection.indexOf(g) >= 0; }
  function setVar(g, on) {
    var i = selection.indexOf(g);
    if (on && i < 0) selection.push(g);
    else if (!on && i >= 0) selection.splice(i, 1);
  }
  function styleOn(kind) { return kind === 'text' ? targets.textStyles : targets.effectStyles; }
  function setStyle(kind, on) { if (kind === 'text') targets.textStyles = on; else targets.effectStyles = on; }
  // catStates: {all, none} across every exportable item (vars + styles) in a
  // category — drives the header master checkbox's checked/indeterminate.
  function catStates(spec) {
    var arr = spec.vars.map(varOn).concat(spec.styles.map(styleOn));
    return { all: arr.length > 0 && arr.every(Boolean), none: arr.every(function (x) { return !x; }) };
  }
  function setCategoryExport(spec, on) {
    spec.vars.forEach(function (g) { setVar(g, on); });
    spec.styles.forEach(function (k) { setStyle(k, on); });
  }
  // lastResult: the most recent {type:'result', created, updated, failed}
  // message from the plugin main thread, or null before any Apply. Unlike
  // the Variables-only prototype this replaces, lastResult is now rendered
  // into #cta-bar — a sibling of #app, NOT inside it — so it survives
  // studio.render()'s full rebuild of #app/#toolbar untouched. It only ever
  // changes via the onmessage handler below (renderCTA() called there), so
  // there is no stale-banner risk to guard against (no resultJustHappened
  // flag needed): #cta-bar is simply never rebuilt by an unrelated store
  // change, so it can only ever show the last real apply result.
  var lastResult = null;

  // ---- Export toggles, injected INTO the shared editor categories via the
  // three createStudio hooks (no separate output panel). Each is called by
  // studio.render() on every store change, so each rebuilds fresh nodes and
  // sets .checked/.indeterminate/.value as DOM PROPERTIES on the fresh node
  // (never via el() attrs — see the checked-attr bug note).

  // moduleExtras: the per-module toggle placed left of each editor module.
  // Variable groups -> a checkbox bound to `selection`. The shadow module ->
  // a checkbox bound to targets.effectStyles ("Effect", since shadow is an
  // Effect Style, not a variable). Modules with no export target -> null.
  function moduleExtras(groupKey) {
    var el = studio.el;
    if (groupKey === 'shadow') {
      var sid = 'ex-shadow';
      var scb = el('input', { type: 'checkbox', id: sid, 'aria-label': 'Export shadow as Effect Style',
        onchange: function (e) { targets.effectStyles = e.target.checked; studio.render(); } });
      scb.checked = targets.effectStyles;
      return el('label', { class: 'export-toggle', for: sid, title: 'Export as Effect Style' }, [scb, ' Effect']);
    }
    if (FM.GROUP_KEYS.indexOf(groupKey) < 0) return null; // not a variable group
    var id = 'ex-var-' + groupKey;
    var cb = el('input', { type: 'checkbox', id: id, 'aria-label': 'Export ' + groupKey + ' as Variable',
      onchange: function (e) { setVar(groupKey, e.target.checked); studio.render(); } });
    cb.checked = varOn(groupKey);
    return el('label', { class: 'export-toggle', for: id, title: 'Export as Variable' }, [cb, ' Var']);
  }

  // categoryHeaderExtras: a NON-interactive export-state indicator shown in
  // the category <summary> (so the export state is visible even when the
  // category is collapsed). Interactive content must not live in <summary>
  // (groupResetBtn precedent), so the actual master checkbox is rendered by
  // categoryBodyTop below. Glyph: all=● (full), partial=◐ (half), none=○
  // (empty). aria-hidden because categoryBodyTop's labelled checkbox already
  // conveys the same state to assistive tech.
  function categoryHeaderExtras(catKey) {
    var el = studio.el;
    var spec = CAT_EXPORT[catKey];
    if (!spec) return null;
    var states = catStates(spec);
    var glyph = states.all ? '●' : (states.none ? '○' : '◐');
    var cls = 'export-ind' + (states.none ? ' export-ind-off' : '');
    return el('span', { class: cls, 'aria-hidden': 'true', title: 'Export: ' + (states.all ? 'all' : (states.none ? 'none' : 'partial')) }, [glyph]);
  }

  // categoryBodyTop: the interactive category master checkbox, rendered as the
  // FIRST row of the category body (not the summary). Checked when all
  // exportable items are on, indeterminate when some are; toggling sets every
  // item in the category. .checked/.indeterminate are DOM properties on the
  // fresh node (never el() attrs — the force-checked bug).
  function categoryBodyTop(catKey) {
    var el = studio.el;
    var spec = CAT_EXPORT[catKey];
    if (!spec) return null;
    var id = 'ex-cat-' + catKey;
    var states = catStates(spec);
    var master = el('input', { type: 'checkbox', id: id,
      onchange: function (e) { setCategoryExport(spec, e.target.checked); studio.render(); } });
    master.checked = states.all;
    master.indeterminate = !states.all && !states.none;
    return el('label', { class: 'sel-row cat-master', for: id }, [master, ' Export all ' + spec.name]);
  }

  // categoryBodyExtras: only Typography gets one — the composite Text Styles
  // item (checkbox + weight checks + font-family input), appended at the end
  // of the Typography category body. It has no editor module of its own (it
  // is a synthesized output), so it lives here, not as a moduleExtras cell.
  // The font input keeps the stable id 'plugin-font-family' so the shared
  // render()'s focus/caret-preservation re-latches onto it across rebuilds.
  function categoryBodyExtras(catKey) {
    if (catKey !== 'typography') return null;
    var el = studio.el;
    var id = 'ex-style-text';
    var cb = el('input', { type: 'checkbox', id: id,
      onchange: function (e) { targets.textStyles = e.target.checked; studio.render(); } });
    cb.checked = targets.textStyles;
    var children = [el('label', { class: 'sel-row', for: id }, [cb, ' Text Styles'])];
    if (targets.textStyles) {
      var weightChecks = ['regular', 'medium', 'semibold', 'bold'].map(function (w) {
        var wid = 'wt-' + w;
        var wcb = el('input', { type: 'checkbox', id: wid,
          onchange: function (e) {
            var i = textWeights.indexOf(w);
            if (e.target.checked && i < 0) textWeights.push(w);
            else if (!e.target.checked && i >= 0) textWeights.splice(i, 1);
          } });
        wcb.checked = textWeights.indexOf(w) >= 0;
        return el('label', { class: 'wt-row', for: wid }, [wcb, ' ' + w]);
      });
      var fontInputId = 'plugin-font-family';
      var fontLabel = el('label', { class: 'font-label', for: fontInputId, text: 'Font family' });
      var fontInput = el('input', { type: 'text', id: fontInputId, class: 'font-input',
        value: fontFamily, 'aria-label': 'Font family',
        oninput: function (e) { fontFamily = e.target.value; } });
      children.push(el('div', { class: 'sel-grid' }, weightChecks));
      children.push(fontLabel);
      children.push(fontInput);
    }
    return el('div', { class: 'export-textstyles' }, children);
  }

  // renderCTA(): (re)builds the ALWAYS-VISIBLE #cta-bar — a sibling of
  // #app/#toolbar, so studio.render() never touches it. It is rendered
  // exactly twice: once here at boot (so the button is visible before any
  // store change), and once inside the onmessage 'result' handler below.
  // The Apply button itself reads store/selection/targets/textWeights/
  // fontFamily from the enclosing closure AT CLICK TIME, so it stays
  // correct without needing to be rebuilt on every keystroke/store change.
  function renderCTA() {
    var el = studio.el;
    var bar = document.getElementById('cta-bar');
    bar.innerHTML = '';
    var applyBtn = el('button', { class: 'apply-btn', text: 'Apply to Figma',
      onclick: function () {
        // targets.variables is derived from `selection` HERE, at click time,
        // rather than kept as its own toggle — the category tree no longer
        // has a single "Figma Variables" master switch; each category's
        // master rolls up its OWN vars+styles leaves, so "should we write
        // variables at all" is simply "is anything selected".
        parent.postMessage({ pluginMessage: {
          type: 'apply',
          config: store.get(),
          selection: selection.slice(),
          targets: { variables: selection.length > 0, textStyles: targets.textStyles, effectStyles: targets.effectStyles },
          textOptions: { weights: textWeights.slice(), family: fontFamily }
        } }, '*');
      } });
    var resultText = '';
    if (lastResult) {
      var failed = lastResult.failed || [];
      resultText = 'Created ' + lastResult.created + ' · Updated ' + lastResult.updated + ' · Failed ' + failed.length;
    }
    bar.appendChild(applyBtn);
    bar.appendChild(el('span', { class: 'cta-result', text: resultText }));
    if (lastResult && (lastResult.failed || []).length) {
      var fails = el('div', { class: 'cta-fails' });
      lastResult.failed.slice(0, 5).forEach(function (f) {
        fails.appendChild(el('div', { class: 'cta-fail', text: f.name + ': ' + f.error }));
      });
      if (lastResult.failed.length > 5) fails.appendChild(el('div', { class: 'cta-fail', text: '…+' + (lastResult.failed.length - 5) + ' more' }));
      bar.appendChild(fails);
    }
  }

  var studio = window.StudioUI.createStudio({
    C: C, store: store,
    appEl: document.getElementById('app'),
    toolbarEl: document.getElementById('toolbar'),
    moduleExtras: moduleExtras,
    categoryHeaderExtras: categoryHeaderExtras,
    categoryBodyTop: categoryBodyTop,
    categoryBodyExtras: categoryBodyExtras
  });

  renderCTA();

  window.onmessage = function (event) {
    var msg = event.data && event.data.pluginMessage;
    if (!msg || msg.type !== 'result') return;
    lastResult = msg;
    renderCTA();
  };

  // Kick off the first paint (createStudio() deliberately does not call
  // render() itself — see the NOTE above its `return { render, el,
  // detailsAttrs }` in core/studio-ui.js: the moduleExtras/
  // categoryHeaderExtras/categoryBodyExtras hooks that need `studio.el`
  // (like the ones above) would crash if render() ran synchronously inside
  // createStudio(), before this IIFE could capture the returned `studio`
  // binding). Every subsequent render is already wired via
  // store.subscribe(render) inside the factory.
  studio.render();
}());
</script>
