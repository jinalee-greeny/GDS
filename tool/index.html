<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Foundations Token Studio</title>
<style>
  :root { color-scheme: light dark; }
  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0; height: 100%;
    font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
    font-size: 14px; line-height: 1.5; color: #1a1a1a; background: #fafafa;
  }
  #app { display: grid; grid-template-columns: minmax(320px, 1fr) minmax(320px, 1fr); min-height: 100vh; }
  .panel-col {
    overflow-y: auto; max-height: 100vh; padding: 16px; border-right: 1px solid #ddd;
  }
  .preview-col { position: sticky; top: 0; align-self: start; max-height: 100vh; overflow-y: auto; padding: 16px; }
  h1 { font-size: 18px; margin: 0 0 12px; }
  h2 { font-size: 15px; margin: 0 0 8px; }
  details.group {
    border: 1px solid #ddd; border-radius: 6px; margin-bottom: 12px; background: #fff; padding: 0;
  }
  details.group > summary {
    cursor: pointer; padding: 10px 12px; font-weight: 600; list-style: revert;
  }
  details.group > summary:focus-visible { outline: 2px solid #2563eb; outline-offset: 2px; }
  .group-body { padding: 4px 12px 12px; }
  .hue-row { border-top: 1px solid #eee; padding: 10px 0; }
  .hue-row:first-child { border-top: none; }
  .hue-title { font-weight: 600; margin-bottom: 6px; text-transform: capitalize; }
  .field-row { display: flex; align-items: center; gap: 8px; margin: 4px 0; flex-wrap: wrap; }
  .field-row label { min-width: 70px; font-size: 12px; color: #444; }
  .field-row input[type="range"] { flex: 1 1 120px; }
  .field-row input[type="number"] { width: 72px; }
  .swatch-strip { display: flex; margin-top: 6px; border-radius: 4px; overflow: hidden; border: 1px solid #ccc; }
  .swatch { flex: 1; height: 28px; }
  .curve-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(64px, 1fr)); gap: 6px; margin-top: 8px; }
  .curve-cell { display: flex; flex-direction: column; gap: 2px; }
  .curve-cell label { font-size: 11px; color: #555; }
  .curve-cell input { width: 100%; }
  .type-row { display: flex; align-items: center; gap: 8px; margin: 6px 0; }
  .type-row label { min-width: 56px; font-size: 12px; color: #444; }
  .type-row input[type="number"] { width: 90px; }
  .modular-scale { display: flex; align-items: flex-end; gap: 10px; margin-top: 10px; padding-top: 10px; border-top: 1px dashed #ccc; flex-wrap: wrap; }
  .modular-scale .field { display: flex; flex-direction: column; gap: 2px; }
  .modular-scale label { font-size: 11px; color: #555; }
  .modular-scale input { width: 90px; }
  .kv-group-body { display: flex; flex-direction: column; gap: 6px; }
  .kv-row { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; padding: 4px 0; border-top: 1px solid #eee; }
  .kv-row:first-child { border-top: none; }
  .kv-row input[type="text"] { padding: 4px 6px; border: 1px solid #ccc; border-radius: 4px; font: inherit; }
  .kv-row .kv-key { flex: 0 1 110px; min-width: 70px; }
  .kv-row .kv-val { flex: 1 1 160px; min-width: 100px; }
  .kv-msg { flex-basis: 100%; font-size: 11px; color: #b91c1c; }
  .kv-add-row { margin-top: 4px; }
  .pv-block { border: 1px solid #ddd; border-radius: 6px; margin-bottom: 12px; padding: 10px 12px; background: #fff; }
  .pv-block h3 { font-size: 13px; margin: 0 0 8px; text-transform: capitalize; }
  .pv-hint { font-size: 11px; color: #666; margin: 0 0 8px; }
  .pv-color-row { display: flex; align-items: center; gap: 8px; margin: 6px 0; }
  .pv-color-label { min-width: 52px; font-size: 12px; text-transform: capitalize; color: #444; }
  .pv-color-col { flex: 1; min-width: 0; }
  .pv-color-strip { display: flex; border-radius: 4px; overflow: hidden; border: 1px solid #ccc; }
  .pv-color-swatch { flex: 1; height: 32px; }
  .pv-color-caption-row { display: flex; margin-top: 2px; }
  .pv-color-caption { flex: 1; font-size: 8px; text-align: center; color: #777; }
  .pv-type-row { display: flex; align-items: baseline; gap: 10px; margin: 6px 0; border-top: 1px solid #eee; padding-top: 6px; }
  .pv-type-row:first-of-type { border-top: none; padding-top: 0; }
  .pv-type-label { min-width: 84px; font-size: 11px; color: #666; flex-shrink: 0; }
  .pv-type-line { white-space: nowrap; overflow-x: auto; min-width: 0; }
  .pv-space-row { display: flex; align-items: center; gap: 8px; margin: 5px 0; }
  .pv-space-label { min-width: 80px; font-size: 11px; color: #666; flex-shrink: 0; }
  .pv-space-bar { height: 14px; background: #2563eb; border-radius: 2px; min-width: 1px; }
  .pv-flex-wrap { display: flex; flex-wrap: wrap; gap: 14px; }
  .pv-item { display: flex; flex-direction: column; align-items: center; gap: 4px; }
  .pv-item-label { font-size: 10px; color: #666; }
  .pv-radius-box { width: 44px; height: 44px; background: #2563eb; }
  .pv-border-box { width: 44px; height: 44px; background: #fff; border-color: #2563eb; }
  .pv-shadow-box { width: 44px; height: 44px; background: #fff; border-radius: 6px; }
  .pv-opacity-block .pv-flex-wrap { padding: 8px; border-radius: 6px;
    background-image: linear-gradient(45deg, #ccc 25%, transparent 25%), linear-gradient(-45deg, #ccc 25%, transparent 25%),
      linear-gradient(45deg, transparent 75%, #ccc 75%), linear-gradient(-45deg, transparent 75%, #ccc 75%);
    background-size: 14px 14px; background-position: 0 0, 0 7px, 7px -7px, -7px 0; }
  .pv-opacity-box { width: 44px; height: 44px; background: #2563eb; border-radius: 6px; }
  .pv-motion-row { margin: 8px 0; border-top: 1px solid #eee; padding-top: 8px; }
  .pv-motion-row:first-of-type { border-top: none; padding-top: 0; }
  .pv-motion-row-label { font-size: 11px; color: #666; margin-bottom: 6px; }
  .pv-motion-cells { display: flex; flex-wrap: wrap; gap: 16px; }
  .pv-motion-cell { display: flex; flex-direction: column; align-items: flex-start; gap: 4px; width: 130px; overflow: hidden; }
  .pv-motion-box { width: 30px; height: 30px; border-radius: 6px; background: #2563eb; transform: translateX(0); }
  .pv-motion-box:hover, .pv-motion-box.playing { transform: translateX(84px); }
  @media (prefers-reduced-motion: reduce) {
    .pv-motion-box { transition-duration: 0ms !important; }
  }
  button {
    font: inherit; cursor: pointer; border: 1px solid #999; background: #f0f0f0;
    border-radius: 4px; padding: 6px 12px;
  }
  button:hover { background: #e6e6e6; }
  button:focus-visible, input:focus-visible, [tabindex]:focus-visible {
    outline: 2px solid #2563eb; outline-offset: 2px;
  }
  .dirty {
    display: inline-block; margin-left: 6px; padding: 1px 6px; font-size: 11px;
    border-radius: 999px; background: #fde68a; color: #713f12; font-weight: 600;
  }
  .badge-pass, .badge-fail {
    display: inline-flex; align-items: center; gap: 4px; padding: 2px 8px; border-radius: 999px;
    font-size: 11px; font-weight: 600;
  }
  .badge-pass { background: #dcfce7; color: #14532d; }
  .badge-fail { background: #fee2e2; color: #7f1d1d; }
  @media (prefers-color-scheme: dark) {
    html, body { color: #eee; background: #1a1a1a; }
    .panel-col { border-right-color: #333; }
    details.group { background: #232323; border-color: #3a3a3a; }
    .hue-row { border-top-color: #333; }
    .field-row label, .curve-cell label, .type-row label, .modular-scale label { color: #aaa; }
    button { background: #2c2c2c; border-color: #555; color: #eee; }
    button:hover { background: #383838; }
    .modular-scale { border-top-color: #444; }
    .kv-row { border-top-color: #333; }
    .kv-row input[type="text"] { background: #1a1a1a; border-color: #555; color: #eee; }
    .kv-msg { color: #fca5a5; }
    .pv-block { background: #232323; border-color: #3a3a3a; }
    .pv-type-row, .pv-motion-row { border-top-color: #333; }
    .pv-color-label, .pv-type-label, .pv-space-label, .pv-item-label, .pv-motion-row-label, .pv-hint, .pv-color-caption { color: #aaa; }
    .pv-border-box, .pv-shadow-box { background: #1a1a1a; }
    .pv-opacity-block .pv-flex-wrap {
      background-image: linear-gradient(45deg, #444 25%, transparent 25%), linear-gradient(-45deg, #444 25%, transparent 25%),
        linear-gradient(45deg, transparent 75%, #444 75%), linear-gradient(-45deg, transparent 75%, #444 75%);
    }
  }
</style>
</head>

<div id="app"></div>

<script id="token-core">
// ---- pure, DOM-free core. Exposed on window.TokenCore and module.exports ----
(function (root) {
  'use strict';

  // Python round(): round half to even
  function pyRound(x) {
    var f = Math.floor(x);
    var diff = x - f;
    if (diff < 0.5) return f;
    if (diff > 0.5) return f + 1;
    return (f % 2 === 0) ? f : f + 1;
  }

  // OKLCH -> sRGB (ported verbatim from build_tokens.py)
  function oklchToSrgb(L, C, Hdeg) {
    var h = Hdeg * Math.PI / 180;
    var a = C * Math.cos(h), b = C * Math.sin(h);
    var l_ = L + 0.3963377774 * a + 0.2158037573 * b;
    var m_ = L - 0.1055613458 * a - 0.0638541728 * b;
    var s_ = L - 0.0894841775 * a - 1.2914855480 * b;
    var l = l_ * l_ * l_, m = m_ * m_ * m_, s = s_ * s_ * s_;
    var r = 4.0767416621 * l - 3.3077115913 * m + 0.2309699292 * s;
    var g = -1.2684380046 * l + 2.6097574011 * m - 0.3413193965 * s;
    var bb = -0.0041960863 * l - 0.7034186147 * m + 1.7076147010 * s;
    function enc(x) {
      x = Math.max(0, Math.min(1, x));
      return x <= 0.0031308 ? 12.92 * x : 1.055 * Math.pow(x, 1 / 2.4) - 0.055;
    }
    return [r, g, bb].map(function (v) { return pyRound(enc(v) * 255); });
  }

  function hex2(n) { return ('0' + n.toString(16).toUpperCase()).slice(-2); }
  function hexof(L, C, Hdeg) {
    var rgb = oklchToSrgb(L, C, Hdeg);
    return '#' + hex2(rgb[0]) + hex2(rgb[1]) + hex2(rgb[2]);
  }

  var DEFAULT_CONFIG = {
    steps: [50,100,200,300,400,500,600,700,800,900,950],
    curves: {
      Lc: [0.972,0.940,0.885,0.808,0.720,0.638,0.560,0.487,0.410,0.335,0.262],
      Cm: [0.30,0.55,0.85,1.05,1.15,1.10,1.00,0.88,0.72,0.55,0.42]
    },
    color: {
      order: ['gray','red','orange','amber','green','teal','blue','violet','pink'],
      palettes: {
        gray:{H:268,Cpk:0.010}, red:{H:27,Cpk:0.190}, orange:{H:55,Cpk:0.170},
        amber:{H:82,Cpk:0.165}, green:{H:150,Cpk:0.150}, teal:{H:185,Cpk:0.120},
        blue:{H:255,Cpk:0.180}, violet:{H:290,Cpk:0.190}, pink:{H:350,Cpk:0.185}
      },
      base: { white:'#FFFFFF', black:'#000000' }
    },
    fontFamily: {
      sans: "Pretendard, system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif",
      serif: "'Noto Serif KR', Georgia, 'Times New Roman', serif",
      mono: "'JetBrains Mono', SFMono-Regular, Menlo, Consolas, monospace"
    },
    fontSize: {'2xs':'11px','xs':'12px','sm':'14px','md':'16px','lg':'18px','xl':'20px',
               '2xl':'24px','3xl':'30px','4xl':'36px','5xl':'48px','6xl':'60px'},
    fontWeight: {regular:'400',medium:'500',semibold:'600',bold:'700'},
    lineHeight: {none:'1',tight:'1.25',snug:'1.375',normal:'1.5',relaxed:'1.625',loose:'2'},
    letterSpacing: {tighter:'-0.05em',tight:'-0.025em',normal:'0em',wide:'0.025em',wider:'0.05em'},
    space: {'0':'0px','1':'4px','2':'8px','3':'12px','4':'16px','5':'20px','6':'24px','8':'32px',
            '10':'40px','12':'48px','16':'64px','20':'80px','24':'96px'},
    radius: {none:'0px',xs:'2px',sm:'4px',md:'6px',lg:'8px',xl:'12px','2xl':'16px','3xl':'24px',full:'9999px'},
    borderWidth: {none:'0px',sm:'1px',md:'2px',lg:'4px'},
    opacity: {'0':'0','5':'0.05','10':'0.1','20':'0.2','40':'0.4','60':'0.6','80':'0.8','100':'1'},
    shadow: {sm:'0 1px 2px rgba(0,0,0,0.08)',md:'0 2px 6px rgba(0,0,0,0.10)',lg:'0 6px 16px rgba(0,0,0,0.12)',
             xl:'0 12px 28px rgba(0,0,0,0.16)','2xl':'0 24px 48px rgba(0,0,0,0.20)'},
    zIndex: {base:'0',dropdown:'1000',sticky:'1100',overlay:'1300',modal:'1400',popover:'1500',toast:'1600',tooltip:'1700'},
    breakpoint: {sm:'640px',md:'768px',lg:'1024px',xl:'1280px','2xl':'1536px'},
    duration: {fast:'100ms',base:'200ms',slow:'300ms',slower:'500ms'},
    easing: {standard:'cubic-bezier(0.4,0,0.2,1)',decelerate:'cubic-bezier(0,0,0.2,1)',
             accelerate:'cubic-bezier(0.4,0,1,1)',linear:'linear'}
  };

  function cloneConfig(cfg) { return JSON.parse(JSON.stringify(cfg)); }

  function buildRamp(hue, cpk, Lc, Cm) {
    var out = {};
    for (var i = 0; i < DEFAULT_CONFIG.steps.length; i++) {
      var step = DEFAULT_CONFIG.steps[i];
      out[String(step)] = hexof(Lc[i], cpk * Cm[i], hue);
    }
    return out;
  }

  function buildAllRamps(cfg) {
    var out = {};
    cfg.color.order.forEach(function (name) {
      var p = cfg.color.palettes[name];
      out[name] = buildRamp(p.H, p.Cpk, cfg.curves.Lc, cfg.curves.Cm);
    });
    return out;
  }

  function toCSS(cfg) {
    var ramps = buildAllRamps(cfg);
    var L = [':root {'];
    var push = function (name, val) { L.push('  --' + name + ': ' + val + ';'); };
    cfg.color.order.forEach(function (name) {
      Object.keys(ramps[name]).forEach(function (s) { push('color-' + name + '-' + s, ramps[name][s]); });
    });
    push('color-white', cfg.color.base.white);
    push('color-black', cfg.color.base.black);
    var each = function (obj, pre) { Object.keys(obj).forEach(function (k) { push(pre + k, obj[k]); }); };
    each(cfg.fontFamily, 'font-');
    each(cfg.fontSize, 'font-size-');
    each(cfg.fontWeight, 'font-weight-');
    each(cfg.lineHeight, 'leading-');
    each(cfg.letterSpacing, 'tracking-');
    each(cfg.space, 'space-');
    each(cfg.radius, 'radius-');
    each(cfg.borderWidth, 'border-');
    each(cfg.opacity, 'opacity-');
    each(cfg.shadow, 'shadow-');
    each(cfg.zIndex, 'z-');
    each(cfg.breakpoint, 'bp-');
    each(cfg.duration, 'duration-');
    each(cfg.easing, 'ease-');
    L.push('}');
    return L.join('\n') + '\n';
  }

  var DTCG_DESC = 'Master Design System Preset — Foundations (primitive layer). Platform-agnostic, DTCG-aligned.';
  function grp(obj, ttype) {
    var out = {};
    Object.keys(obj).forEach(function (k) { out[k] = { $type: ttype, $value: obj[k] }; });
    return out;
  }
  function toDTCG(cfg) {
    var ramps = buildAllRamps(cfg);
    var color = {};
    cfg.color.order.forEach(function (name) {
      var g = {};
      Object.keys(ramps[name]).forEach(function (s) { g[s] = { $type: 'color', $value: ramps[name][s] }; });
      color[name] = g;
    });
    color.base = grp(cfg.color.base, 'color');
    var dtcg = {
      $description: DTCG_DESC,
      color: color,
      font: { family: grp(cfg.fontFamily, 'fontFamily'), size: grp(cfg.fontSize, 'dimension'), weight: grp(cfg.fontWeight, 'fontWeight') },
      lineHeight: grp(cfg.lineHeight, 'number'),
      letterSpacing: grp(cfg.letterSpacing, 'dimension'),
      space: grp(cfg.space, 'dimension'),
      radius: grp(cfg.radius, 'dimension'),
      borderWidth: grp(cfg.borderWidth, 'dimension'),
      opacity: grp(cfg.opacity, 'number'),
      shadow: grp(cfg.shadow, 'shadow'),
      zIndex: grp(cfg.zIndex, 'number'),
      breakpoint: grp(cfg.breakpoint, 'dimension'),
      duration: grp(cfg.duration, 'duration'),
      easing: grp(cfg.easing, 'cubicBezier')
    };
    return JSON.stringify(dtcg, null, 2);
  }

  function toTailwind(cfg) {
    var ramps = buildAllRamps(cfg);
    var colors = {};
    cfg.color.order.forEach(function (name) { colors[name] = ramps[name]; });
    colors.white = cfg.color.base.white;
    colors.black = cfg.color.base.black;
    var tw = { theme: { extend: {
      colors: colors,
      fontFamily: cfg.fontFamily,
      fontSize: cfg.fontSize,
      fontWeight: cfg.fontWeight,
      lineHeight: cfg.lineHeight,
      letterSpacing: cfg.letterSpacing,
      spacing: cfg.space,
      borderRadius: cfg.radius,
      borderWidth: cfg.borderWidth,
      opacity: cfg.opacity,
      boxShadow: cfg.shadow,
      zIndex: cfg.zIndex,
      screens: cfg.breakpoint,
      transitionDuration: cfg.duration,
      transitionTimingFunction: cfg.easing
    } } };
    return '// Tailwind preset generated from tokens.json (SSOT)\nmodule.exports = ' + JSON.stringify(tw, null, 2) + ';\n';
  }

  function tsGrp(obj, type) {
    var out = {};
    Object.keys(obj).forEach(function (k) { out[k] = { value: obj[k], type: type }; });
    return out;
  }
  function toFigma(cfg) {
    var ramps = buildAllRamps(cfg);
    var color = {};
    cfg.color.order.forEach(function (name) {
      var g = {};
      Object.keys(ramps[name]).forEach(function (s) { g[s] = { value: ramps[name][s], type: 'color' }; });
      color[name] = g;
    });
    color.base = { white: { value: cfg.color.base.white, type: 'color' }, black: { value: cfg.color.base.black, type: 'color' } };
    var out = {
      color: color,
      fontFamilies: tsGrp(cfg.fontFamily, 'fontFamilies'),
      fontSizes: tsGrp(cfg.fontSize, 'fontSizes'),
      fontWeights: tsGrp(cfg.fontWeight, 'fontWeights'),
      lineHeights: tsGrp(cfg.lineHeight, 'lineHeights'),
      letterSpacing: tsGrp(cfg.letterSpacing, 'letterSpacing'),
      spacing: tsGrp(cfg.space, 'spacing'),
      borderRadius: tsGrp(cfg.radius, 'borderRadius'),
      borderWidth: tsGrp(cfg.borderWidth, 'borderWidth'),
      opacity: tsGrp(cfg.opacity, 'opacity'),
      boxShadow: tsGrp(cfg.shadow, 'boxShadow')
    };
    return JSON.stringify(out, null, 2);
  }

  function relLuminance(hex) {
    var ch = [1, 3, 5].map(function (i) { return parseInt(hex.slice(i, i + 2), 16) / 255; });
    var f = function (c) { return c <= 0.03928 ? c / 12.92 : Math.pow((c + 0.055) / 1.055, 2.4); };
    return 0.2126 * f(ch[0]) + 0.7152 * f(ch[1]) + 0.0722 * f(ch[2]);
  }

  function contrastRatio(a, b) {
    var la = relLuminance(a), lb = relLuminance(b);
    var hi = Math.max(la, lb), lo = Math.min(la, lb);
    return (hi + 0.05) / (lo + 0.05);
  }

  function contrastReport(cfg) {
    var ramps = buildAllRamps(cfg);
    var hues = ['gray'].concat(cfg.color.order.filter(function (n) { return n !== 'gray'; }));
    return hues.map(function (name) {
      var ramp = ramps[name];
      var steps = Object.keys(ramp);
      var onWhite = steps.filter(function (s) { return contrastRatio(ramp[s], '#FFFFFF') >= 4.5; });
      var onBlack = steps.filter(function (s) { return contrastRatio(ramp[s], '#000000') >= 4.5; });
      var minS = onWhite.length ? String(Math.min.apply(null, onWhite.map(Number))) : '—';
      var maxS = onBlack.length ? String(Math.max.apply(null, onBlack.map(Number))) : '—';
      return { hue: name, whiteMinStep: minS, blackMaxStep: maxS };
    });
  }

  function deepEqual(a, b) { return JSON.stringify(a) === JSON.stringify(b); }

  function createStore(initial) {
    var current = cloneConfig(initial || DEFAULT_CONFIG);
    var undoStack = [], redoStack = [], subs = [];
    function notify() { subs.forEach(function (fn) { fn(current); }); }
    function commit(next) {
      undoStack.push(current);
      redoStack = [];
      current = next;
      notify();
    }
    function setPath(path, value) {
      var next = cloneConfig(current), node = next;
      for (var i = 0; i < path.length - 1; i++) node = node[path[i]];
      node[path[path.length - 1]] = value;
      commit(next);
    }
    return {
      get: function () { return current; },
      setPath: setPath,
      undo: function () { if (!undoStack.length) return false; redoStack.push(current); current = undoStack.pop(); notify(); return true; },
      redo: function () { if (!redoStack.length) return false; undoStack.push(current); current = redoStack.pop(); notify(); return true; },
      canUndo: function () { return undoStack.length > 0; },
      canRedo: function () { return redoStack.length > 0; },
      isDirty: function () { return !deepEqual(current, DEFAULT_CONFIG); },
      resetAll: function () { commit(cloneConfig(DEFAULT_CONFIG)); },
      resetGroup: function (key) { var next = cloneConfig(current); next[key] = cloneConfig(DEFAULT_CONFIG[key]); commit(next); },
      loadConfig: function (cfg) { commit(cloneConfig(cfg)); },
      subscribe: function (fn) { subs.push(fn); return function () { subs = subs.filter(function (s) { return s !== fn; }); }; }
    };
  }

  var TokenCore = { pyRound: pyRound, oklchToSrgb: oklchToSrgb, hexof: hexof,
    DEFAULT_CONFIG: DEFAULT_CONFIG, cloneConfig: cloneConfig,
    buildRamp: buildRamp, buildAllRamps: buildAllRamps, toCSS: toCSS, toDTCG: toDTCG, toTailwind: toTailwind, toFigma: toFigma,
    relLuminance: relLuminance, contrastRatio: contrastRatio, contrastReport: contrastReport, createStore: createStore };
  root.TokenCore = TokenCore;
  if (typeof module !== 'undefined' && module.exports) module.exports = TokenCore;
})(typeof window !== 'undefined' ? window : globalThis);
</script>

<script>
// ---- UI shell + generative editors ----
(function () {
  'use strict';
  var C = window.TokenCore;
  var store = C.createStore();
  var app = document.getElementById('app');
  window.Studio = { store: store, C: C };

  function el(tag, attrs, children) {
    var n = document.createElement(tag);
    if (attrs) Object.keys(attrs).forEach(function (k) {
      if (k === 'class') n.className = attrs[k];
      else if (k.slice(0, 2) === 'on') n.addEventListener(k.slice(2).toLowerCase(), attrs[k]);
      else if (k === 'text') n.textContent = attrs[k];
      else n.setAttribute(k, attrs[k]);
    });
    (children || []).forEach(function (c) { n.appendChild(typeof c === 'string' ? document.createTextNode(c) : c); });
    return n;
  }
  window.Studio.el = el;

  var FONT_SIZE_ORDER = ['2xs', 'xs', 'sm', 'md', 'lg', 'xl', '2xl', '3xl', '4xl', '5xl', '6xl'];

  // A color field = a labelled range slider + paired number input, both driving
  // the same palette key. During a slider DRAG we only repaint live (no store
  // write, so the DOM node survives and keeps pointer capture); we commit once
  // on 'change' (drag end / keyboard commit) for exactly one undo step. The
  // number input commits on its own 'input' (safe: render() restores focus/caret).
  function colorField(hue, keyName, labelText, value, min, max, step, refs) {
    var baseId = 'ctl-color-' + hue + '-' + keyName;
    var number = el('input', {
      type: 'number', id: baseId, value: String(value),
      min: String(min), max: String(max), step: String(step),
      oninput: function (e) {
        store.setPath(['color', 'palettes', hue, keyName], Number(e.target.value));
      }
    });
    var range = el('input', {
      type: 'range', id: baseId + '-range', 'aria-label': labelText + ' (slider)',
      value: String(value), min: String(min), max: String(max), step: String(step),
      oninput: function (e) {
        var v = Number(e.target.value);
        number.value = String(v);        // keep paired number in sync, no commit
        refs.repaint();                  // live swatch repaint, DOM preserved
      },
      onchange: function (e) {
        store.setPath(['color', 'palettes', hue, keyName], Number(e.target.value));
      }
    });
    refs[keyName] = { number: number, range: range };
    var label = el('label', { for: baseId, text: labelText });
    return el('div', { class: 'field-row' }, [label, range, number]);
  }

  function renderHueRow(cfg, ramps, hue) {
    var p = cfg.color.palettes[hue];
    var swatchNodes = {};
    var swatches = C.DEFAULT_CONFIG.steps.map(function (step) {
      var hex = ramps[hue][String(step)];
      var node = el('div', {
        class: 'swatch', id: 'swatch-' + hue + '-' + step,
        style: 'background:' + hex, title: hue + ' ' + step + ' ' + hex
      });
      swatchNodes[String(step)] = node;
      return node;
    });
    var strip = el('div', { class: 'swatch-strip', role: 'img', 'aria-label': hue + ' ramp preview' }, swatches);

    var refs = {
      // recompute this hue's ramp from the CURRENT live control values and
      // repaint the existing swatch nodes in place (no rebuild).
      repaint: function () {
        var liveH = Number(refs.H.range.value);
        var liveCpk = Number(refs.Cpk.range.value);
        var ramp = C.buildRamp(liveH, liveCpk, cfg.curves.Lc, cfg.curves.Cm);
        C.DEFAULT_CONFIG.steps.forEach(function (step) {
          var hex = ramp[String(step)];
          var node = swatchNodes[String(step)];
          node.style.background = hex;
          node.title = hue + ' ' + step + ' ' + hex;
        });
      }
    };

    var hRow = colorField(hue, 'H', 'H', p.H, 0, 360, 1, refs);
    var cpkRow = colorField(hue, 'Cpk', 'Cpk', p.Cpk, 0, 0.4, 0.005, refs);
    return el('div', { class: 'hue-row' }, [
      el('div', { class: 'hue-title', text: hue }),
      hRow, cpkRow, strip
    ]);
  }

  function renderCurveEditor(cfg) {
    var lcCells = cfg.curves.Lc.map(function (v, i) {
      var id = 'ctl-curve-Lc-' + i;
      var input = el('input', {
        type: 'number', id: id, value: String(v), min: '0', max: '1', step: '0.001',
        oninput: function (e) { store.setPath(['curves', 'Lc', i], Number(e.target.value)); }
      });
      var label = el('label', { for: id, text: 'Lc[' + C.DEFAULT_CONFIG.steps[i] + ']' });
      return el('div', { class: 'curve-cell' }, [label, input]);
    });
    var cmCells = cfg.curves.Cm.map(function (v, i) {
      var id = 'ctl-curve-Cm-' + i;
      var input = el('input', {
        type: 'number', id: id, value: String(v), min: '0', max: '2', step: '0.01',
        oninput: function (e) { store.setPath(['curves', 'Cm', i], Number(e.target.value)); }
      });
      var label = el('label', { for: id, text: 'Cm[' + C.DEFAULT_CONFIG.steps[i] + ']' });
      return el('div', { class: 'curve-cell' }, [label, input]);
    });
    return el('details', {}, [
      el('summary', { text: 'Advanced curve (shared Lc / Cm)' }),
      el('div', { class: 'group-body' }, [
        el('h2', { text: 'Lc (lightness per step)' }),
        el('div', { class: 'curve-grid' }, lcCells),
        el('h2', { text: 'Cm (chroma multiplier per step)' }),
        el('div', { class: 'curve-grid' }, cmCells)
      ])
    ]);
  }

  function renderColorPanel(cfg) {
    var ramps = C.buildAllRamps(cfg);
    var rows = cfg.color.order.map(function (hue) { return renderHueRow(cfg, ramps, hue); });
    return el('details', { class: 'group', open: 'open' }, [
      el('summary', { text: 'Color' }),
      el('div', { class: 'group-body' }, rows.concat([renderCurveEditor(cfg)]))
    ]);
  }

  function renderTypePanel(cfg) {
    var rows = FONT_SIZE_ORDER.map(function (key) {
      var id = 'ctl-fontsize-' + key;
      var px = parseFloat(cfg.fontSize[key]);
      var input = el('input', {
        type: 'number', id: id, value: String(px), min: '1', step: '1',
        oninput: function (e) {
          var n = Number(e.target.value);
          store.setPath(['fontSize', key], String(n) + 'px');
        }
      });
      var label = el('label', { for: id, text: key });
      return el('div', { class: 'type-row' }, [label, input, el('span', { text: 'px' })]);
    });

    var baseId = 'ctl-modscale-base', ratioId = 'ctl-modscale-ratio';
    var baseInput = el('input', { type: 'number', id: baseId, value: '16', min: '1', step: '1' });
    var ratioInput = el('input', { type: 'number', id: ratioId, value: '1.25', min: '1', step: '0.01' });
    var applyBtn = el('button', {
      type: 'button', text: 'Apply modular scale',
      onclick: function () {
        var base = Number(baseInput.value);
        var ratio = Number(ratioInput.value);
        var mdIndex = FONT_SIZE_ORDER.indexOf('md');
        var next = {};
        FONT_SIZE_ORDER.forEach(function (key, i) {
          var n = i - mdIndex;
          var px = C.pyRound(base * Math.pow(ratio, n));
          next[key] = String(px) + 'px';
        });
        store.setPath(['fontSize'], next);
      }
    });
    var modScale = el('div', { class: 'modular-scale' }, [
      el('div', { class: 'field' }, [el('label', { for: baseId, text: 'Base (px)' }), baseInput]),
      el('div', { class: 'field' }, [el('label', { for: ratioId, text: 'Ratio' }), ratioInput]),
      applyBtn
    ]);

    return el('details', { class: 'group', open: 'open' }, [
      el('summary', { text: 'Type Scale' }),
      el('div', { class: 'group-body' }, rows.concat([modScale]))
    ]);
  }

  // ---- List-scale (key/value) editors ----------------------------------
  // A "group" is a flat object like cfg.space = {'0':'0px','1':'4px',...}.
  // Renaming/adding/removing a key rebuilds the whole object (order preserved
  // via the live key list, then a single setGroup commit) rather than
  // mutating in place, since plain JS objects have no stable key-rename op.
  function setGroup(groupKey, obj) {
    store.setPath([groupKey], obj);
  }

  function showKVMessage(msgEl, text) {
    if (!msgEl) return;
    msgEl.textContent = text;
    if (msgEl._kvClearTimer) clearTimeout(msgEl._kvClearTimer);
    msgEl._kvClearTimer = setTimeout(function () { msgEl.textContent = ''; }, 4000);
  }

  // Renders one row per entry of store.get()[groupKey], plus an "Add row"
  // button. Row ids are INDEX-based (ctl-kv-<groupKey>-<i>-key/-val), not
  // key-based, because the key text itself is editable — an id derived from
  // the key would change out from under focus-preservation on every
  // keystroke of a rename. Index stays stable across re-renders as long as
  // rows aren't added/removed, which is exactly when focus needs to survive
  // (plain value edits, and key edits prior to the commit that revalidates).
  function renderKVGroup(groupKey, opts) {
    opts = opts || {};
    var labelText = opts.label || groupKey;
    var placeholder = opts.placeholder || '';
    var cfg = store.get();
    var group = cfg[groupKey] || {};
    var keys = Object.keys(group);

    var rows = keys.map(function (key, i) {
      var keyId = 'ctl-kv-' + groupKey + '-' + i + '-key';
      var valId = 'ctl-kv-' + groupKey + '-' + i + '-val';
      var msgId = 'ctl-kv-' + groupKey + '-' + i + '-msg';

      // Key rename commits on 'change' (blur/Enter), not 'input'. Unlike
      // value edits, a key is validated (non-empty, unique in this group)
      // before it can commit; validating per-keystroke would revert the
      // field mid-edit (e.g. the instant a user backspaces it to empty),
      // making it impossible to actually clear-and-retype a key. Committing
      // once the user leaves the field keeps the guard from fighting typing.
      var keyInput = el('input', {
        type: 'text', id: keyId, class: 'kv-key', value: key,
        'aria-label': labelText + ' 키 ' + (i + 1),
        onkeydown: function (e) { if (e.key === 'Enter') e.target.blur(); },
        onchange: function (e) {
          var newKey = e.target.value;
          var msgEl = document.getElementById(msgId);
          if (newKey === key) return; // unchanged, nothing to do
          var liveGroup = store.get()[groupKey];
          var liveKeys = Object.keys(liveGroup);
          if (newKey === '') {
            e.target.value = key;
            showKVMessage(msgEl, '키는 비워둘 수 없습니다.');
            return;
          }
          if (liveKeys.indexOf(newKey) !== -1) {
            e.target.value = key;
            showKVMessage(msgEl, '이미 존재하는 키입니다: ' + newKey);
            return;
          }
          var next = {};
          liveKeys.forEach(function (k) {
            next[k === key ? newKey : k] = liveGroup[k];
          });
          setGroup(groupKey, next);
        }
      });

      var valInput = el('input', {
        type: 'text', id: valId, class: 'kv-val', value: group[key], placeholder: placeholder,
        'aria-label': labelText + ' 값 (' + key + ')',
        oninput: function (e) {
          store.setPath([groupKey, key], e.target.value);
        }
      });

      var removeBtn = el('button', {
        type: 'button', text: '삭제', 'aria-label': labelText + ' 항목 삭제: ' + key,
        onclick: function () {
          var liveGroup = store.get()[groupKey];
          var next = {};
          Object.keys(liveGroup).forEach(function (k) { if (k !== key) next[k] = liveGroup[k]; });
          setGroup(groupKey, next);
        }
      });

      var msg = el('span', { id: msgId, class: 'kv-msg', role: 'alert', 'aria-live': 'polite' });

      return el('div', { class: 'kv-row' }, [keyInput, valInput, removeBtn, msg]);
    });

    var addBtn = el('button', {
      type: 'button', class: 'kv-add-row', text: '행 추가',
      onclick: function () {
        var liveGroup = store.get()[groupKey];
        var liveKeys = Object.keys(liveGroup);
        var base = 'new', candidate = base, n = 1;
        while (liveKeys.indexOf(candidate) !== -1) { candidate = base + n; n++; }
        var next = {};
        liveKeys.forEach(function (k) { next[k] = liveGroup[k]; });
        next[candidate] = opts.newValue != null ? opts.newValue : '';
        setGroup(groupKey, next);
      }
    });

    return el('div', { class: 'kv-group-body' }, rows.concat([addBtn]));
  }

  function renderKVSection(groupKey, labelText, opts) {
    var sectionOpts = Object.assign({ label: labelText }, opts || {});
    return el('details', { class: 'group' }, [
      el('summary', { text: labelText }),
      el('div', { class: 'group-body' }, [renderKVGroup(groupKey, sectionOpts)])
    ]);
  }

  var KV_GROUPS = [
    ['space', '간격(space)', { placeholder: '예: 16px' }],
    ['radius', '모서리(radius)', { placeholder: '예: 8px' }],
    ['borderWidth', '테두리 두께(borderWidth)', { placeholder: '예: 2px' }],
    ['opacity', '불투명도(opacity)', { placeholder: '예: 0.5' }],
    ['shadow', '그림자(shadow)', { placeholder: '예: 0 2px 6px rgba(0,0,0,.1)' }],
    ['zIndex', '쌓임 순서(zIndex)', { placeholder: '예: 1000' }],
    ['breakpoint', '브레이크포인트(breakpoint)', { placeholder: '예: 768px' }],
    ['duration', '지속시간(duration)', { placeholder: '예: 200ms' }],
    ['easing', '이징(easing)', { placeholder: '예: cubic-bezier(0.4,0,0.2,1)' }],
    ['fontFamily', '폰트 패밀리(fontFamily)', { placeholder: '예: Pretendard, sans-serif' }],
    ['fontWeight', '폰트 굵기(fontWeight)', { placeholder: '예: 600' }],
    ['lineHeight', '줄 높이(lineHeight)', { placeholder: '예: 1.5' }],
    ['letterSpacing', '자간(letterSpacing)', { placeholder: '예: 0.025em' }]
  ];

  function renderListPanels() {
    return KV_GROUPS.map(function (entry) {
      return renderKVSection(entry[0], entry[1], entry[2]);
    });
  }

  // ---- Live preview panel (right column) --------------------------------
  // Read-only: every renderer below derives its output purely from
  // store.get() (and C.buildAllRamps for color), never writes to the store,
  // and contains no focusable controls — so it cannot interfere with the
  // focus-preservation logic in render().
  var TYPE_SAMPLE = '다람쥐 헌 쳇바퀴에 타고파 Ag 123';

  function renderColorPreview(cfg, ramps) {
    var rows = cfg.color.order.map(function (hue) {
      var swatches = C.DEFAULT_CONFIG.steps.map(function (step) {
        var hex = ramps[hue][String(step)];
        return el('div', { class: 'pv-color-swatch', style: 'background:' + hex, title: hue + ' ' + step + ' ' + hex });
      });
      var captions = C.DEFAULT_CONFIG.steps.map(function (step) {
        return el('div', { class: 'pv-color-caption', text: String(step) });
      });
      var col = el('div', { class: 'pv-color-col' }, [
        el('div', { class: 'pv-color-strip', role: 'img', 'aria-label': hue + ' ramp' }, swatches),
        el('div', { class: 'pv-color-caption-row' }, captions)
      ]);
      return el('div', { class: 'pv-color-row' }, [el('div', { class: 'pv-color-label', text: hue }), col]);
    });
    return el('div', { class: 'pv-block' }, [el('h3', { text: 'Color' })].concat(rows));
  }

  function renderTypePreview(cfg) {
    var rows = FONT_SIZE_ORDER.map(function (key) {
      var px = cfg.fontSize[key];
      var line = el('div', {
        class: 'pv-type-line',
        style: 'font-size:' + px + ';font-family:' + cfg.fontFamily.sans + ';',
        text: TYPE_SAMPLE
      });
      return el('div', { class: 'pv-type-row' }, [el('div', { class: 'pv-type-label', text: key + ' / ' + px }), line]);
    });
    return el('div', { class: 'pv-block' }, [el('h3', { text: 'Type' })].concat(rows));
  }

  function renderSpacingPreview(cfg) {
    var rows = Object.keys(cfg.space).map(function (key) {
      var val = cfg.space[key];
      var bar = el('div', { class: 'pv-space-bar', style: 'width:' + val });
      return el('div', { class: 'pv-space-row' }, [el('div', { class: 'pv-space-label', text: key + ' / ' + val }), bar]);
    });
    return el('div', { class: 'pv-block' }, [el('h3', { text: 'Spacing' })].concat(rows));
  }

  function renderRadiusPreview(cfg) {
    var items = Object.keys(cfg.radius).map(function (key) {
      var val = cfg.radius[key];
      var box = el('div', { class: 'pv-radius-box', style: 'border-radius:' + val });
      return el('div', { class: 'pv-item' }, [box, el('div', { class: 'pv-item-label', text: key + ' / ' + val })]);
    });
    return el('div', { class: 'pv-block' }, [el('h3', { text: 'Radius' }), el('div', { class: 'pv-flex-wrap' }, items)]);
  }

  function renderBorderPreview(cfg) {
    var items = Object.keys(cfg.borderWidth).map(function (key) {
      var val = cfg.borderWidth[key];
      var box = el('div', { class: 'pv-border-box', style: 'border-style:solid;border-width:' + val });
      return el('div', { class: 'pv-item' }, [box, el('div', { class: 'pv-item-label', text: key + ' / ' + val })]);
    });
    return el('div', { class: 'pv-block' }, [el('h3', { text: 'Border width' }), el('div', { class: 'pv-flex-wrap' }, items)]);
  }

  function renderShadowPreview(cfg) {
    var items = Object.keys(cfg.shadow).map(function (key) {
      var val = cfg.shadow[key];
      var box = el('div', { class: 'pv-shadow-box', style: 'box-shadow:' + val });
      return el('div', { class: 'pv-item' }, [box, el('div', { class: 'pv-item-label', text: key })]);
    });
    return el('div', { class: 'pv-block' }, [el('h3', { text: 'Shadow' }), el('div', { class: 'pv-flex-wrap' }, items)]);
  }

  function renderOpacityPreview(cfg) {
    var items = Object.keys(cfg.opacity).map(function (key) {
      var val = cfg.opacity[key];
      var box = el('div', { class: 'pv-opacity-box', style: 'opacity:' + val });
      return el('div', { class: 'pv-item' }, [box, el('div', { class: 'pv-item-label', text: key + ' / ' + val })]);
    });
    return el('div', { class: 'pv-block pv-opacity-block' }, [el('h3', { text: 'Opacity' }), el('div', { class: 'pv-flex-wrap' }, items)]);
  }

  // Motion demo: transition duration/easing come from the live config via
  // inline `transition`, so any store change is reflected without extra
  // wiring. Trigger is CSS :hover (no store write) plus an optional "Play
  // all" button that toggles a class briefly — not an autoplay loop.
  function renderMotionPreview(cfg) {
    var reduceMotion = !!(window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches);
    var durationKeys = Object.keys(cfg.duration);
    var easingKeys = Object.keys(cfg.easing);
    var boxRefs = [];
    var maxMs = durationKeys.reduce(function (max, k) { return Math.max(max, parseFloat(cfg.duration[k]) || 0); }, 0);

    var rows = durationKeys.map(function (dKey) {
      var dVal = cfg.duration[dKey];
      var cells = easingKeys.map(function (eKey) {
        var eVal = cfg.easing[eKey];
        var box = el('div', {
          class: 'pv-motion-box',
          style: 'transition:transform ' + dVal + ' ' + eVal + ';',
          title: dKey + ' (' + dVal + ') / ' + eKey
        });
        boxRefs.push(box);
        return el('div', { class: 'pv-motion-cell' }, [box, el('div', { class: 'pv-item-label', text: eKey })]);
      });
      return el('div', { class: 'pv-motion-row' }, [
        el('div', { class: 'pv-motion-row-label', text: dKey + ' / ' + dVal }),
        el('div', { class: 'pv-motion-cells' }, cells)
      ]);
    });

    var playBtn = el('button', {
      type: 'button', text: 'Play all',
      onclick: function () {
        boxRefs.forEach(function (box) { box.classList.add('playing'); });
        setTimeout(function () {
          boxRefs.forEach(function (box) { box.classList.remove('playing'); });
        }, reduceMotion ? 0 : maxMs + 300);
      }
    });

    return el('div', { class: 'pv-block' }, [
      el('h3', { text: 'Motion' }),
      el('p', { class: 'pv-hint', text: 'Hover a box, or press Play all (respects reduced-motion).' }),
      playBtn
    ].concat(rows));
  }

  function renderPreview(cfg) {
    var ramps = C.buildAllRamps(cfg);
    return [
      renderColorPreview(cfg, ramps),
      renderTypePreview(cfg),
      renderSpacingPreview(cfg),
      renderRadiusPreview(cfg),
      renderBorderPreview(cfg),
      renderShadowPreview(cfg),
      renderOpacityPreview(cfg),
      renderMotionPreview(cfg)
    ];
  }

  function render() {
    var cfg = store.get();

    // Fix A: preserve focus + caret across the full rebuild. Every interactive
    // input has a stable id, so we re-find the same field after re-render.
    var act = document.activeElement;
    var savedId = act && act.id;
    var ss = null, se = null;
    try { ss = act.selectionStart; se = act.selectionEnd; } catch (e) {}

    app.innerHTML = '';

    var title = el('h1', { text: 'Foundations Token Studio' });
    if (store.isDirty()) title.appendChild(el('span', { class: 'dirty', text: 'unsaved changes' }));

    var leftCol = el('div', { class: 'panel-col' }, [
      title,
      renderColorPanel(cfg),
      renderTypePanel(cfg)
    ].concat(renderListPanels()));

    var rightCol = el('div', { class: 'preview-col' }, [
      el('h2', { text: 'Preview' })
    ].concat(renderPreview(cfg)));

    app.appendChild(leftCol);
    app.appendChild(rightCol);

    if (savedId) {
      var n = document.getElementById(savedId);
      if (n) {
        n.focus();
        if (ss != null && n.setSelectionRange) {
          try { n.setSelectionRange(ss, se); } catch (e) {}
        }
      }
    }
  }
  window.Studio.render = render;
  store.subscribe(render);
  render();
})();
</script>
</body>
</html>
