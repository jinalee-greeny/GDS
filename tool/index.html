<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Foundations Token Studio</title>
<style>
  :root { color-scheme: light dark; }
  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0; height: 100%;
    font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
    font-size: 14px; line-height: 1.5; color: #1a1a1a; background: #fafafa;
  }
  #app { display: grid; grid-template-columns: minmax(320px, 1fr) minmax(320px, 1fr); min-height: 100vh; }
  .panel-col {
    overflow-y: auto; max-height: 100vh; padding: 16px; border-right: 1px solid #ddd;
  }
  .preview-col { position: sticky; top: 0; align-self: start; max-height: 100vh; overflow-y: auto; padding: 16px; }
  h1 { font-size: 18px; margin: 0 0 12px; }
  h2 { font-size: 15px; margin: 0 0 8px; }
  details.group {
    border: 1px solid #ddd; border-radius: 6px; margin-bottom: 12px; background: #fff; padding: 0;
  }
  details.group > summary {
    cursor: pointer; padding: 10px 12px; font-weight: 600; list-style: revert;
  }
  details.group > summary:focus-visible { outline: 2px solid #2563eb; outline-offset: 2px; }
  .group-body { padding: 4px 12px 12px; }
  .hue-row { border-top: 1px solid #eee; padding: 10px 0; }
  .hue-row:first-child { border-top: none; }
  .hue-title { font-weight: 600; margin-bottom: 6px; text-transform: capitalize; }
  .field-row { display: flex; align-items: center; gap: 8px; margin: 4px 0; flex-wrap: wrap; }
  .field-row label { min-width: 70px; font-size: 12px; color: #444; }
  .field-row input[type="range"] { flex: 1 1 120px; }
  .field-row input[type="number"] { width: 72px; }
  .swatch-strip { display: flex; margin-top: 6px; border-radius: 4px; overflow: hidden; border: 1px solid #ccc; }
  .swatch { flex: 1; height: 28px; }
  .curve-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(64px, 1fr)); gap: 6px; margin-top: 8px; }
  .curve-cell { display: flex; flex-direction: column; gap: 2px; }
  .curve-cell label { font-size: 11px; color: #555; }
  .curve-cell input { width: 100%; }
  .type-row { display: flex; align-items: center; gap: 8px; margin: 6px 0; }
  .type-row label { min-width: 56px; font-size: 12px; color: #444; }
  .type-row input[type="number"] { width: 90px; }
  .modular-scale { display: flex; align-items: flex-end; gap: 10px; margin-top: 10px; padding-top: 10px; border-top: 1px dashed #ccc; flex-wrap: wrap; }
  .modular-scale .field { display: flex; flex-direction: column; gap: 2px; }
  .modular-scale label { font-size: 11px; color: #555; }
  .modular-scale input { width: 90px; }
  button {
    font: inherit; cursor: pointer; border: 1px solid #999; background: #f0f0f0;
    border-radius: 4px; padding: 6px 12px;
  }
  button:hover { background: #e6e6e6; }
  button:focus-visible, input:focus-visible, [tabindex]:focus-visible {
    outline: 2px solid #2563eb; outline-offset: 2px;
  }
  .dirty {
    display: inline-block; margin-left: 6px; padding: 1px 6px; font-size: 11px;
    border-radius: 999px; background: #fde68a; color: #713f12; font-weight: 600;
  }
  .badge-pass, .badge-fail {
    display: inline-flex; align-items: center; gap: 4px; padding: 2px 8px; border-radius: 999px;
    font-size: 11px; font-weight: 600;
  }
  .badge-pass { background: #dcfce7; color: #14532d; }
  .badge-fail { background: #fee2e2; color: #7f1d1d; }
  @media (prefers-color-scheme: dark) {
    html, body { color: #eee; background: #1a1a1a; }
    .panel-col { border-right-color: #333; }
    details.group { background: #232323; border-color: #3a3a3a; }
    .hue-row { border-top-color: #333; }
    .field-row label, .curve-cell label, .type-row label, .modular-scale label { color: #aaa; }
    button { background: #2c2c2c; border-color: #555; color: #eee; }
    button:hover { background: #383838; }
    .modular-scale { border-top-color: #444; }
  }
</style>
</head>
<body>
<div id="app"></div>

<script id="token-core">
// ---- pure, DOM-free core. Exposed on window.TokenCore and module.exports ----
(function (root) {
  'use strict';

  // Python round(): round half to even
  function pyRound(x) {
    var f = Math.floor(x);
    var diff = x - f;
    if (diff < 0.5) return f;
    if (diff > 0.5) return f + 1;
    return (f % 2 === 0) ? f : f + 1;
  }

  // OKLCH -> sRGB (ported verbatim from build_tokens.py)
  function oklchToSrgb(L, C, Hdeg) {
    var h = Hdeg * Math.PI / 180;
    var a = C * Math.cos(h), b = C * Math.sin(h);
    var l_ = L + 0.3963377774 * a + 0.2158037573 * b;
    var m_ = L - 0.1055613458 * a - 0.0638541728 * b;
    var s_ = L - 0.0894841775 * a - 1.2914855480 * b;
    var l = l_ * l_ * l_, m = m_ * m_ * m_, s = s_ * s_ * s_;
    var r = 4.0767416621 * l - 3.3077115913 * m + 0.2309699292 * s;
    var g = -1.2684380046 * l + 2.6097574011 * m - 0.3413193965 * s;
    var bb = -0.0041960863 * l - 0.7034186147 * m + 1.7076147010 * s;
    function enc(x) {
      x = Math.max(0, Math.min(1, x));
      return x <= 0.0031308 ? 12.92 * x : 1.055 * Math.pow(x, 1 / 2.4) - 0.055;
    }
    return [r, g, bb].map(function (v) { return pyRound(enc(v) * 255); });
  }

  function hex2(n) { return ('0' + n.toString(16).toUpperCase()).slice(-2); }
  function hexof(L, C, Hdeg) {
    var rgb = oklchToSrgb(L, C, Hdeg);
    return '#' + hex2(rgb[0]) + hex2(rgb[1]) + hex2(rgb[2]);
  }

  var DEFAULT_CONFIG = {
    steps: [50,100,200,300,400,500,600,700,800,900,950],
    curves: {
      Lc: [0.972,0.940,0.885,0.808,0.720,0.638,0.560,0.487,0.410,0.335,0.262],
      Cm: [0.30,0.55,0.85,1.05,1.15,1.10,1.00,0.88,0.72,0.55,0.42]
    },
    color: {
      order: ['gray','red','orange','amber','green','teal','blue','violet','pink'],
      palettes: {
        gray:{H:268,Cpk:0.010}, red:{H:27,Cpk:0.190}, orange:{H:55,Cpk:0.170},
        amber:{H:82,Cpk:0.165}, green:{H:150,Cpk:0.150}, teal:{H:185,Cpk:0.120},
        blue:{H:255,Cpk:0.180}, violet:{H:290,Cpk:0.190}, pink:{H:350,Cpk:0.185}
      },
      base: { white:'#FFFFFF', black:'#000000' }
    },
    fontFamily: {
      sans: "Pretendard, system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif",
      serif: "'Noto Serif KR', Georgia, 'Times New Roman', serif",
      mono: "'JetBrains Mono', SFMono-Regular, Menlo, Consolas, monospace"
    },
    fontSize: {'2xs':'11px','xs':'12px','sm':'14px','md':'16px','lg':'18px','xl':'20px',
               '2xl':'24px','3xl':'30px','4xl':'36px','5xl':'48px','6xl':'60px'},
    fontWeight: {regular:'400',medium:'500',semibold:'600',bold:'700'},
    lineHeight: {none:'1',tight:'1.25',snug:'1.375',normal:'1.5',relaxed:'1.625',loose:'2'},
    letterSpacing: {tighter:'-0.05em',tight:'-0.025em',normal:'0em',wide:'0.025em',wider:'0.05em'},
    space: {'0':'0px','1':'4px','2':'8px','3':'12px','4':'16px','5':'20px','6':'24px','8':'32px',
            '10':'40px','12':'48px','16':'64px','20':'80px','24':'96px'},
    radius: {none:'0px',xs:'2px',sm:'4px',md:'6px',lg:'8px',xl:'12px','2xl':'16px','3xl':'24px',full:'9999px'},
    borderWidth: {none:'0px',sm:'1px',md:'2px',lg:'4px'},
    opacity: {'0':'0','5':'0.05','10':'0.1','20':'0.2','40':'0.4','60':'0.6','80':'0.8','100':'1'},
    shadow: {sm:'0 1px 2px rgba(0,0,0,0.08)',md:'0 2px 6px rgba(0,0,0,0.10)',lg:'0 6px 16px rgba(0,0,0,0.12)',
             xl:'0 12px 28px rgba(0,0,0,0.16)','2xl':'0 24px 48px rgba(0,0,0,0.20)'},
    zIndex: {base:'0',dropdown:'1000',sticky:'1100',overlay:'1300',modal:'1400',popover:'1500',toast:'1600',tooltip:'1700'},
    breakpoint: {sm:'640px',md:'768px',lg:'1024px',xl:'1280px','2xl':'1536px'},
    duration: {fast:'100ms',base:'200ms',slow:'300ms',slower:'500ms'},
    easing: {standard:'cubic-bezier(0.4,0,0.2,1)',decelerate:'cubic-bezier(0,0,0.2,1)',
             accelerate:'cubic-bezier(0.4,0,1,1)',linear:'linear'}
  };

  function cloneConfig(cfg) { return JSON.parse(JSON.stringify(cfg)); }

  function buildRamp(hue, cpk, Lc, Cm) {
    var out = {};
    for (var i = 0; i < DEFAULT_CONFIG.steps.length; i++) {
      var step = DEFAULT_CONFIG.steps[i];
      out[String(step)] = hexof(Lc[i], cpk * Cm[i], hue);
    }
    return out;
  }

  function buildAllRamps(cfg) {
    var out = {};
    cfg.color.order.forEach(function (name) {
      var p = cfg.color.palettes[name];
      out[name] = buildRamp(p.H, p.Cpk, cfg.curves.Lc, cfg.curves.Cm);
    });
    return out;
  }

  function toCSS(cfg) {
    var ramps = buildAllRamps(cfg);
    var L = [':root {'];
    var push = function (name, val) { L.push('  --' + name + ': ' + val + ';'); };
    cfg.color.order.forEach(function (name) {
      Object.keys(ramps[name]).forEach(function (s) { push('color-' + name + '-' + s, ramps[name][s]); });
    });
    push('color-white', cfg.color.base.white);
    push('color-black', cfg.color.base.black);
    var each = function (obj, pre) { Object.keys(obj).forEach(function (k) { push(pre + k, obj[k]); }); };
    each(cfg.fontFamily, 'font-');
    each(cfg.fontSize, 'font-size-');
    each(cfg.fontWeight, 'font-weight-');
    each(cfg.lineHeight, 'leading-');
    each(cfg.letterSpacing, 'tracking-');
    each(cfg.space, 'space-');
    each(cfg.radius, 'radius-');
    each(cfg.borderWidth, 'border-');
    each(cfg.opacity, 'opacity-');
    each(cfg.shadow, 'shadow-');
    each(cfg.zIndex, 'z-');
    each(cfg.breakpoint, 'bp-');
    each(cfg.duration, 'duration-');
    each(cfg.easing, 'ease-');
    L.push('}');
    return L.join('\n') + '\n';
  }

  var DTCG_DESC = 'Master Design System Preset — Foundations (primitive layer). Platform-agnostic, DTCG-aligned.';
  function grp(obj, ttype) {
    var out = {};
    Object.keys(obj).forEach(function (k) { out[k] = { $type: ttype, $value: obj[k] }; });
    return out;
  }
  function toDTCG(cfg) {
    var ramps = buildAllRamps(cfg);
    var color = {};
    cfg.color.order.forEach(function (name) {
      var g = {};
      Object.keys(ramps[name]).forEach(function (s) { g[s] = { $type: 'color', $value: ramps[name][s] }; });
      color[name] = g;
    });
    color.base = grp(cfg.color.base, 'color');
    var dtcg = {
      $description: DTCG_DESC,
      color: color,
      font: { family: grp(cfg.fontFamily, 'fontFamily'), size: grp(cfg.fontSize, 'dimension'), weight: grp(cfg.fontWeight, 'fontWeight') },
      lineHeight: grp(cfg.lineHeight, 'number'),
      letterSpacing: grp(cfg.letterSpacing, 'dimension'),
      space: grp(cfg.space, 'dimension'),
      radius: grp(cfg.radius, 'dimension'),
      borderWidth: grp(cfg.borderWidth, 'dimension'),
      opacity: grp(cfg.opacity, 'number'),
      shadow: grp(cfg.shadow, 'shadow'),
      zIndex: grp(cfg.zIndex, 'number'),
      breakpoint: grp(cfg.breakpoint, 'dimension'),
      duration: grp(cfg.duration, 'duration'),
      easing: grp(cfg.easing, 'cubicBezier')
    };
    return JSON.stringify(dtcg, null, 2);
  }

  function toTailwind(cfg) {
    var ramps = buildAllRamps(cfg);
    var colors = {};
    cfg.color.order.forEach(function (name) { colors[name] = ramps[name]; });
    colors.white = cfg.color.base.white;
    colors.black = cfg.color.base.black;
    var tw = { theme: { extend: {
      colors: colors,
      fontFamily: cfg.fontFamily,
      fontSize: cfg.fontSize,
      fontWeight: cfg.fontWeight,
      lineHeight: cfg.lineHeight,
      letterSpacing: cfg.letterSpacing,
      spacing: cfg.space,
      borderRadius: cfg.radius,
      borderWidth: cfg.borderWidth,
      opacity: cfg.opacity,
      boxShadow: cfg.shadow,
      zIndex: cfg.zIndex,
      screens: cfg.breakpoint,
      transitionDuration: cfg.duration,
      transitionTimingFunction: cfg.easing
    } } };
    return '// Tailwind preset generated from tokens.json (SSOT)\nmodule.exports = ' + JSON.stringify(tw, null, 2) + ';\n';
  }

  function tsGrp(obj, type) {
    var out = {};
    Object.keys(obj).forEach(function (k) { out[k] = { value: obj[k], type: type }; });
    return out;
  }
  function toFigma(cfg) {
    var ramps = buildAllRamps(cfg);
    var color = {};
    cfg.color.order.forEach(function (name) {
      var g = {};
      Object.keys(ramps[name]).forEach(function (s) { g[s] = { value: ramps[name][s], type: 'color' }; });
      color[name] = g;
    });
    color.base = { white: { value: cfg.color.base.white, type: 'color' }, black: { value: cfg.color.base.black, type: 'color' } };
    var out = {
      color: color,
      fontFamilies: tsGrp(cfg.fontFamily, 'fontFamilies'),
      fontSizes: tsGrp(cfg.fontSize, 'fontSizes'),
      fontWeights: tsGrp(cfg.fontWeight, 'fontWeights'),
      lineHeights: tsGrp(cfg.lineHeight, 'lineHeights'),
      letterSpacing: tsGrp(cfg.letterSpacing, 'letterSpacing'),
      spacing: tsGrp(cfg.space, 'spacing'),
      borderRadius: tsGrp(cfg.radius, 'borderRadius'),
      borderWidth: tsGrp(cfg.borderWidth, 'borderWidth'),
      opacity: tsGrp(cfg.opacity, 'opacity'),
      boxShadow: tsGrp(cfg.shadow, 'boxShadow')
    };
    return JSON.stringify(out, null, 2);
  }

  function relLuminance(hex) {
    var ch = [1, 3, 5].map(function (i) { return parseInt(hex.slice(i, i + 2), 16) / 255; });
    var f = function (c) { return c <= 0.03928 ? c / 12.92 : Math.pow((c + 0.055) / 1.055, 2.4); };
    return 0.2126 * f(ch[0]) + 0.7152 * f(ch[1]) + 0.0722 * f(ch[2]);
  }

  function contrastRatio(a, b) {
    var la = relLuminance(a), lb = relLuminance(b);
    var hi = Math.max(la, lb), lo = Math.min(la, lb);
    return (hi + 0.05) / (lo + 0.05);
  }

  function contrastReport(cfg) {
    var ramps = buildAllRamps(cfg);
    var hues = ['gray'].concat(cfg.color.order.filter(function (n) { return n !== 'gray'; }));
    return hues.map(function (name) {
      var ramp = ramps[name];
      var steps = Object.keys(ramp);
      var onWhite = steps.filter(function (s) { return contrastRatio(ramp[s], '#FFFFFF') >= 4.5; });
      var onBlack = steps.filter(function (s) { return contrastRatio(ramp[s], '#000000') >= 4.5; });
      var minS = onWhite.length ? String(Math.min.apply(null, onWhite.map(Number))) : '—';
      var maxS = onBlack.length ? String(Math.max.apply(null, onBlack.map(Number))) : '—';
      return { hue: name, whiteMinStep: minS, blackMaxStep: maxS };
    });
  }

  function deepEqual(a, b) { return JSON.stringify(a) === JSON.stringify(b); }

  function createStore(initial) {
    var current = cloneConfig(initial || DEFAULT_CONFIG);
    var undoStack = [], redoStack = [], subs = [];
    function notify() { subs.forEach(function (fn) { fn(current); }); }
    function commit(next) {
      undoStack.push(current);
      redoStack = [];
      current = next;
      notify();
    }
    function setPath(path, value) {
      var next = cloneConfig(current), node = next;
      for (var i = 0; i < path.length - 1; i++) node = node[path[i]];
      node[path[path.length - 1]] = value;
      commit(next);
    }
    return {
      get: function () { return current; },
      setPath: setPath,
      undo: function () { if (!undoStack.length) return false; redoStack.push(current); current = undoStack.pop(); notify(); return true; },
      redo: function () { if (!redoStack.length) return false; undoStack.push(current); current = redoStack.pop(); notify(); return true; },
      canUndo: function () { return undoStack.length > 0; },
      canRedo: function () { return redoStack.length > 0; },
      isDirty: function () { return !deepEqual(current, DEFAULT_CONFIG); },
      resetAll: function () { commit(cloneConfig(DEFAULT_CONFIG)); },
      resetGroup: function (key) { var next = cloneConfig(current); next[key] = cloneConfig(DEFAULT_CONFIG[key]); commit(next); },
      loadConfig: function (cfg) { commit(cloneConfig(cfg)); },
      subscribe: function (fn) { subs.push(fn); return function () { subs = subs.filter(function (s) { return s !== fn; }); }; }
    };
  }

  var TokenCore = { pyRound: pyRound, oklchToSrgb: oklchToSrgb, hexof: hexof,
    DEFAULT_CONFIG: DEFAULT_CONFIG, cloneConfig: cloneConfig,
    buildRamp: buildRamp, buildAllRamps: buildAllRamps, toCSS: toCSS, toDTCG: toDTCG, toTailwind: toTailwind, toFigma: toFigma,
    relLuminance: relLuminance, contrastRatio: contrastRatio, contrastReport: contrastReport, createStore: createStore };
  root.TokenCore = TokenCore;
  if (typeof module !== 'undefined' && module.exports) module.exports = TokenCore;
})(typeof window !== 'undefined' ? window : globalThis);
</script>

<script>
// ---- UI shell + generative editors ----
(function () {
  'use strict';
  var C = window.TokenCore;
  var store = C.createStore();
  var app = document.getElementById('app');
  window.Studio = { store: store, C: C };

  function el(tag, attrs, children) {
    var n = document.createElement(tag);
    if (attrs) Object.keys(attrs).forEach(function (k) {
      if (k === 'class') n.className = attrs[k];
      else if (k.slice(0, 2) === 'on') n.addEventListener(k.slice(2).toLowerCase(), attrs[k]);
      else if (k === 'text') n.textContent = attrs[k];
      else n.setAttribute(k, attrs[k]);
    });
    (children || []).forEach(function (c) { n.appendChild(typeof c === 'string' ? document.createTextNode(c) : c); });
    return n;
  }
  window.Studio.el = el;

  var FONT_SIZE_ORDER = ['2xs', 'xs', 'sm', 'md', 'lg', 'xl', '2xl', '3xl', '4xl', '5xl', '6xl'];

  function labeledNumber(id, labelText, value, min, max, step, onInput) {
    var input = el('input', {
      type: 'number', id: id, value: String(value), min: String(min), max: String(max), step: String(step),
      oninput: function (e) { onInput(Number(e.target.value)); }
    });
    var label = el('label', { for: id, text: labelText });
    return { label: label, input: input };
  }

  function fieldRow(id, labelText, value, min, max, step, onInput) {
    var range = el('input', {
      type: 'range', id: id + '-range', 'aria-label': labelText + ' (slider)',
      value: String(value), min: String(min), max: String(max), step: String(step),
      oninput: function (e) { onInput(Number(e.target.value)); }
    });
    var pair = labeledNumber(id, labelText, value, min, max, step, onInput);
    return el('div', { class: 'field-row' }, [pair.label, range, pair.input]);
  }

  function renderHueRow(cfg, ramps, hue) {
    var p = cfg.color.palettes[hue];
    var swatches = C.DEFAULT_CONFIG.steps.map(function (step) {
      var hex = ramps[hue][String(step)];
      return el('div', { class: 'swatch', style: 'background:' + hex, title: hue + ' ' + step + ' ' + hex });
    });
    var strip = el('div', { class: 'swatch-strip', role: 'img', 'aria-label': hue + ' ramp preview' }, swatches);
    var hRow = fieldRow('color-' + hue + '-h', 'H', p.H, 0, 360, 1, function (v) {
      store.setPath(['color', 'palettes', hue, 'H'], v);
    });
    var cpkRow = fieldRow('color-' + hue + '-cpk', 'Cpk', p.Cpk, 0, 0.4, 0.005, function (v) {
      store.setPath(['color', 'palettes', hue, 'Cpk'], v);
    });
    return el('div', { class: 'hue-row' }, [
      el('div', { class: 'hue-title', text: hue }),
      hRow, cpkRow, strip
    ]);
  }

  function renderCurveEditor(cfg) {
    var lcCells = cfg.curves.Lc.map(function (v, i) {
      var id = 'curve-lc-' + i;
      var input = el('input', {
        type: 'number', id: id, value: String(v), min: '0', max: '1', step: '0.001',
        oninput: function (e) { store.setPath(['curves', 'Lc', i], Number(e.target.value)); }
      });
      var label = el('label', { for: id, text: 'Lc[' + C.DEFAULT_CONFIG.steps[i] + ']' });
      return el('div', { class: 'curve-cell' }, [label, input]);
    });
    var cmCells = cfg.curves.Cm.map(function (v, i) {
      var id = 'curve-cm-' + i;
      var input = el('input', {
        type: 'number', id: id, value: String(v), min: '0', max: '2', step: '0.01',
        oninput: function (e) { store.setPath(['curves', 'Cm', i], Number(e.target.value)); }
      });
      var label = el('label', { for: id, text: 'Cm[' + C.DEFAULT_CONFIG.steps[i] + ']' });
      return el('div', { class: 'curve-cell' }, [label, input]);
    });
    return el('details', {}, [
      el('summary', { text: 'Advanced curve (shared Lc / Cm)' }),
      el('div', { class: 'group-body' }, [
        el('h2', { text: 'Lc (lightness per step)' }),
        el('div', { class: 'curve-grid' }, lcCells),
        el('h2', { text: 'Cm (chroma multiplier per step)' }),
        el('div', { class: 'curve-grid' }, cmCells)
      ])
    ]);
  }

  function renderColorPanel(cfg) {
    var ramps = C.buildAllRamps(cfg);
    var rows = cfg.color.order.map(function (hue) { return renderHueRow(cfg, ramps, hue); });
    return el('details', { class: 'group', open: 'open' }, [
      el('summary', { text: 'Color' }),
      el('div', { class: 'group-body' }, rows.concat([renderCurveEditor(cfg)]))
    ]);
  }

  function renderTypePanel(cfg) {
    var rows = FONT_SIZE_ORDER.map(function (key) {
      var id = 'fontsize-' + key;
      var px = parseFloat(cfg.fontSize[key]);
      var input = el('input', {
        type: 'number', id: id, value: String(px), min: '1', step: '1',
        oninput: function (e) {
          var n = Number(e.target.value);
          store.setPath(['fontSize', key], String(n) + 'px');
        }
      });
      var label = el('label', { for: id, text: key });
      return el('div', { class: 'type-row' }, [label, input, el('span', { text: 'px' })]);
    });

    var baseId = 'modscale-base', ratioId = 'modscale-ratio';
    var baseInput = el('input', { type: 'number', id: baseId, value: '16', min: '1', step: '1' });
    var ratioInput = el('input', { type: 'number', id: ratioId, value: '1.25', min: '1', step: '0.01' });
    var applyBtn = el('button', {
      type: 'button', text: 'Apply modular scale',
      onclick: function () {
        var base = Number(baseInput.value);
        var ratio = Number(ratioInput.value);
        var mdIndex = FONT_SIZE_ORDER.indexOf('md');
        var next = {};
        FONT_SIZE_ORDER.forEach(function (key, i) {
          var n = i - mdIndex;
          var px = C.pyRound(base * Math.pow(ratio, n));
          next[key] = String(px) + 'px';
        });
        store.setPath(['fontSize'], next);
      }
    });
    var modScale = el('div', { class: 'modular-scale' }, [
      el('div', { class: 'field' }, [el('label', { for: baseId, text: 'Base (px)' }), baseInput]),
      el('div', { class: 'field' }, [el('label', { for: ratioId, text: 'Ratio' }), ratioInput]),
      applyBtn
    ]);

    return el('details', { class: 'group', open: 'open' }, [
      el('summary', { text: 'Type Scale' }),
      el('div', { class: 'group-body' }, rows.concat([modScale]))
    ]);
  }

  function render() {
    var cfg = store.get();
    app.innerHTML = '';

    var title = el('h1', { text: 'Foundations Token Studio' });
    if (store.isDirty()) title.appendChild(el('span', { class: 'dirty', text: 'unsaved changes' }));

    var leftCol = el('div', { class: 'panel-col' }, [
      title,
      renderColorPanel(cfg),
      renderTypePanel(cfg)
    ]);

    var rightCol = el('div', { class: 'preview-col' }, [
      el('h2', { text: 'Preview' }),
      el('p', { text: 'Live preview panel is built in a later task.' })
    ]);

    app.appendChild(leftCol);
    app.appendChild(rightCol);
  }
  window.Studio.render = render;
  store.subscribe(render);
  render();
})();
</script>
</body>
</html>
