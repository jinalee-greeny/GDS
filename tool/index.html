<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Foundations Token Studio</title>
<!-- Pretendard webfont (web shell only; the Figma plugin is networkAccess:none
     and cannot load it, falling back to the system font by design). Without
     this, 'Pretendard' only renders where it's installed locally. -->
<link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css">
<style>  :root {
    color-scheme: light dark;
    /* Editor palette — single source of truth (this is a tokens tool; it
       should drive its own UI from variables, not scattered literals). */
    --bg: #f6f7f9;            /* app background (slightly cool off-white) */
    --surface: #ffffff;       /* cards / groups */
    --surface-sunken: #f1f3f6;/* code preview, insets */
    --border: #e3e6eb;        /* card & divider borders */
    --border-strong: #cdd2da; /* input borders */
    --hairline: #edeff2;      /* row separators */
    --text: #1b1e24;          /* body text (cool near-black, not #000) */
    --muted: #5b636f;         /* secondary text */
    --muted-2: #7c8491;       /* captions */
    --accent: #3b5bd9;        /* single considered accent (~68% sat, not AI-blue) */
    --btn-bg: #eef0f4;
    --btn-border: #c9cfd8;
    --btn-hover: #e4e7ec;
    --btn-active: #d8dce3;
    --font-sans: 'Pretendard', system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
    --font-mono: 'Pretendard', system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
    /* Soft-editorial shape/depth: rounder cards, gentle floating shadow. */
    --radius-card: 14px;
    --radius-ctl: 10px;
    --shadow-card: 0 1px 2px rgba(20, 24, 33, .04), 0 6px 18px rgba(20, 24, 33, .06);
    /* Phosphor caret-right (MIT), as a mask so it inherits theme color via
       background-color and rotates on open like the old unicode glyph. */
    --caret: url("data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%20256%20256'%3E%3Cpath%20fill='%23000'%20d='M184.49,136.49l-80,80a12,12,0,0,1-17-17L159,128,87.51,56.49a12,12,0,1,1,17-17l80,80A12,12,0,0,1,184.49,136.49Z'/%3E%3C/svg%3E");
  }
  .icon { width: 1em; height: 1em; flex: 0 0 auto; }
  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0; height: 100%;
    font-family: var(--font-sans);
    font-size: 15px; line-height: 1.6; color: var(--text); background: var(--bg);
    -webkit-font-smoothing: antialiased;
  }
  body { display: flex; flex-direction: column; }
  #toolbar {
    position: sticky; top: 0; z-index: 30; flex: 0 0 auto;
    display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 8px 16px;
    padding: 10px 16px; background: var(--bg); border-bottom: 1px solid var(--border);
  }
  .toolbar-title-group { display: flex; align-items: center; gap: 4px; flex-wrap: wrap; }
  .toolbar-title-group h1 { margin: 0; }
  .toolbar-actions { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
  #app { display: flex; flex-direction: column; flex: 1 1 auto; min-height: 0; }
  /* Preview-first: the preview owns the wide left track (the thing you read),
     controls collapse to a narrower right inspector (the thing you poke at
     occasionally). order:1/2 flips them visually without touching DOM/id order
     so the scroll-preservation and Edit|Preview tab logic keep working. */
  .app-body {
    display: grid; grid-template-columns: 1fr minmax(360px, 440px); grid-template-rows: 1fr;
    flex: 1 1 auto; min-height: 0;
  }
  .preview-col { order: 1; }
  .panel-col { order: 2; }
  /* Edit|Preview tabs: hidden (both panes shown) on wide screens; the
     max-width media query below reveals them and hides the inactive pane. */
  .app-tabs { display: none; }
  .app-tab {
    font: inherit; cursor: pointer; background: transparent; border: none;
    border-bottom: 2px solid transparent; border-radius: 0; padding: 6px 12px;
    color: var(--muted); font-weight: 600;
  }
  .app-tab:hover { background: var(--hairline); }
  .app-tab[aria-selected="true"] { color: var(--text); border-bottom-color: var(--accent); }
  .panel-col {
    overflow-y: auto; height: 100%; padding: 24px 22px 40px; border-left: 1px solid var(--border);
  }
  /* Wrapper: fixed nav header + scrollable body. It does NOT scroll itself. */
  .preview-col { display: flex; flex-direction: column; height: 100%; min-height: 0; overflow: hidden; }
  .preview-body { flex: 1 1 auto; min-height: 0; overflow-y: auto; padding: 20px 22px 40px; }
  h1 { font-size: 19px; margin: 0 0 12px; letter-spacing: -0.01em; }
  h2 { font-size: 17px; font-weight: 650; letter-spacing: -0.01em; margin: 0 0 14px; }
  /* Depth 2 (module): flat and contained — no card chrome, no shadow. It reads
     as content INSIDE the depth-1 category card (below), not a floating card
     of its own. */
  details.group {
    border: none; border-radius: 0; margin-bottom: 0;
    background: transparent; padding: 0; box-shadow: none;
  }
  details.group > summary { padding: 11px 8px; }
  /* One disclosure vocabulary for the whole tool: every <summary> gets the
     same custom chevron (categories override size/color below). Kills the
     browser-default triangle so module cards and the category index read as
     one coherent hierarchy instead of two clashing widget styles. */
  details > summary {
    cursor: pointer; padding: 13px 16px; font-weight: 600; list-style: none;
    display: flex; align-items: center; gap: 8px;
    border-radius: var(--radius-card); transition: background-color .12s ease;
  }
  details > summary::-webkit-details-marker { display: none; }
  details > summary::before {
    content: ''; flex: 0 0 auto; width: 11px; height: 11px; background-color: var(--muted-2);
    -webkit-mask: var(--caret) center / contain no-repeat; mask: var(--caret) center / contain no-repeat;
    transition: transform .15s ease;
  }
  details[open] > summary::before { transform: rotate(90deg); }
  details > summary:hover { background: var(--hairline); }
  details[open] > summary { border-radius: var(--radius-card) var(--radius-card) 0 0; }
  details > summary:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }
  /* Reset appears atop every module body; a bordered button there reads as an
     orphan floating above the content. Recede it to a muted ghost link so the
     editing controls, not the reset affordance, lead the eye. */
  .group-reset-btn {
    display: inline-flex; align-items: center; gap: 4px; font-size: 12px; padding: 3px 7px; margin: 0 0 8px;
    background: transparent; border: none; color: var(--muted-2); font-weight: 600;
  }
  .group-reset-btn:hover { background: var(--hairline); color: var(--text); }
  .group-body { padding: 4px 8px 14px; }
  /* Depth 1 (category) is the container CARD: a surface panel whose header is
     its title bar and whose body holds the flat depth-2 modules. This is the
     "2뎁 포함 in 1뎁" color hierarchy — gray panel → white category card →
     modules within. */
  details.category {
    margin-bottom: 14px; background: var(--surface);
    border: 1px solid var(--border); border-radius: var(--radius-card);
  }
  summary.category-header {
    display: flex; align-items: center; gap: 10px; list-style: none;
    padding: 12px 14px;
  }
  details.category > summary.category-header { border-radius: var(--radius-card); }
  details.category[open] > summary.category-header {
    border-radius: var(--radius-card) var(--radius-card) 0 0;
    border-bottom: 1px solid var(--hairline);
  }
  /* Hairline between stacked modules inside one category card (accordion). */
  .category-body .module-row + .module-row { border-top: 1px solid var(--hairline); }
  /* Tabs layout (web shell): a calm underline tab bar (not loud filled pills)
     so a 5-module category reads as one tidy row, not a block of blue chips. */
  .mod-tabs {
    display: flex; flex-wrap: wrap; gap: 0 4px; padding: 2px 6px 0; margin-bottom: 10px;
    box-shadow: inset 0 -1px 0 var(--hairline);
  }
  .mod-tab {
    border: none; background: transparent; color: var(--muted);
    font-size: 12px; font-weight: 500; padding: 7px 7px 8px; border-radius: 0;
    border-bottom: 2px solid transparent;
  }
  .mod-tab:hover { color: var(--text); }
  .mod-tab[aria-selected="true"] { color: var(--text); font-weight: 600; border-bottom-color: var(--accent); }
  /* Master-detail (web shell): top domain selector; one domain's preview + its
     settings shown side by side below. */
  .domain-nav {
    flex: 0 0 auto; display: flex; flex-wrap: wrap; gap: 4px;
    padding: 9px 16px; background: var(--bg); border-bottom: 1px solid var(--border);
  }
  .domain-tab {
    border: none; background: transparent; color: var(--muted);
    font-size: 13px; font-weight: 600; padding: 6px 12px; border-radius: 8px;
  }
  .domain-tab:hover { background: var(--hairline); color: var(--text); }
  .domain-tab[aria-selected="true"] { background: var(--accent); color: #fff; }
  .domain-tab[aria-selected="true"]:hover { background: var(--accent); color: #fff; }
  .domain-tab-export { margin-left: auto; } /* push Export to the far end */
  .app-body-single { grid-template-columns: 1fr; }
  .a11y-block { max-width: 840px; }
  .pv-kv-val { font-size: 12px; color: var(--muted); font-variant-numeric: tabular-nums; }
  .pv-sub-gap { height: 14px; }
  summary.category-header::-webkit-details-marker { display: none; }
  summary.category-header::before {
    content: ''; flex: 0 0 auto; width: 12px; height: 12px; background-color: var(--muted-2);
    -webkit-mask: var(--caret) center / contain no-repeat; mask: var(--caret) center / contain no-repeat;
    transition: transform .15s ease;
  }
  details.category[open] > summary.category-header::before { transform: rotate(90deg); }
  /* Category = the top-level index label, not a card title. Distinct
     treatment (uppercase, tracked eyebrow) ranks it clearly ABOVE the
     sentence-case module titles inside, and makes the collapsed left panel
     read as a tidy editorial table of contents. */
  .category-title { font-size: 13px; font-weight: 700; letter-spacing: 0.05em; text-transform: uppercase; color: var(--text); }
  .category-body { padding: 4px 12px 12px; }
  /* Export = output section, not a 7th editing category: same card language,
     set slightly apart with extra top margin (web shell only). */
  details.category.category-export { margin-top: 20px; }
  .module-row { display: flex; align-items: flex-start; gap: 8px; }
  .module-row > details { flex: 1 1 auto; min-width: 0; }
  /* Narrow (Figma plugin): single column with an Edit|Preview tab; only the
     active pane shows. Wide screens ignore data-tab and show both. */
  @media (max-width: 899px) {
    .app-tabs { display: flex; gap: 6px; padding: 8px 16px 0; }
    .app-body { grid-template-columns: 1fr; }
    #app[data-tab="edit"] .preview-col { display: none; }
    #app[data-tab="preview"] .panel-col { display: none; }
    .panel-col { border-left: none; }
  }
  .panel-hint { font-size: 12px; color: var(--muted); margin: 0 0 6px; }
  .hue-row { border-top: 1px solid var(--hairline); padding: 12px 0; }
  .hue-row:first-child { border-top: none; padding-top: 4px; }
  /* Title + focus hint share one row. The hint fills the remaining width and
     truncates (never wraps), so showing/hiding it on focus can't change the
     row height — the controls below never shift. */
  .hue-title-row { display: flex; align-items: baseline; gap: 8px; margin-bottom: 8px; }
  .hue-title { flex: 0 0 auto; font-size: 13px; font-weight: 650; text-transform: capitalize; letter-spacing: -0.01em; }
  .hue-hint { flex: 1 1 auto; min-width: 0; font-size: 12px; color: var(--muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .field-row { display: flex; align-items: center; gap: 10px; margin: 5px 0; flex-wrap: wrap; }
  .field-row label { min-width: 40px; font-size: 12px; color: var(--muted); }
  .field-row input[type="range"] { flex: 1 1 120px; accent-color: var(--accent); }
  .field-row input[type="number"] { width: 78px; font-variant-numeric: tabular-nums; }
  .swatch-strip { display: flex; margin-top: 6px; border-radius: 8px; overflow: hidden; border: 1px solid var(--border); }
  .swatch { flex: 1; height: 30px; }
  /* Manual color scale editor: a scale block (name + delete) over its step
     rows (swatch picker + step name + hex), each freely editable. */
  .scale-block { border-top: 1px solid var(--hairline); padding: 14px 0; }
  .scale-block:first-child { border-top: none; padding-top: 4px; }
  .scale-head { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; }
  .scale-name { flex: 1 1 auto; min-width: 0; font-weight: 650; }
  .step-row { display: flex; align-items: center; gap: 6px; margin: 5px 0; }
  .step-picker {
    flex: 0 0 auto; width: 30px; height: 30px; padding: 0; cursor: pointer;
    border: 1px solid var(--border-strong); border-radius: 8px; background: none;
  }
  .step-picker::-webkit-color-swatch-wrapper { padding: 3px; }
  .step-picker::-webkit-color-swatch { border: none; border-radius: 5px; }
  .step-picker::-moz-color-swatch { border: none; border-radius: 5px; }
  .step-name { flex: 0 1 86px; min-width: 56px; }
  .step-hex { flex: 1 1 100px; min-width: 88px; font-variant-numeric: tabular-nums; text-transform: uppercase; }
  .scale-add { margin-top: 12px; }
  .curve-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(64px, 1fr)); gap: 6px; margin-top: 8px; }
  .curve-cell { display: flex; flex-direction: column; gap: 2px; }
  .curve-cell label { font-size: 12px; color: var(--muted); }
  .curve-cell input { width: 100%; font-variant-numeric: tabular-nums; }
  .type-row { display: flex; align-items: center; gap: 8px; margin: 6px 0; }
  .type-row label { min-width: 56px; font-size: 12px; color: var(--muted); }
  .type-row input[type="number"] { width: 78px; font-variant-numeric: tabular-nums; }
  .modular-scale { display: flex; align-items: flex-end; gap: 10px; margin-top: 10px; padding-top: 10px; border-top: 1px dashed var(--border-strong); flex-wrap: wrap; }
  .modular-scale .field { display: flex; flex-direction: column; gap: 2px; }
  .modular-scale label { font-size: 12px; color: var(--muted); }
  .modular-scale input { width: 78px; font-variant-numeric: tabular-nums; }
  .kv-group-body { display: flex; flex-direction: column; gap: 6px; }
  .kv-row { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; padding: 4px 0; border-top: 1px solid var(--hairline); }
  .kv-row:first-child { border-top: none; }
  .kv-row input[type="text"] { padding: 6px 10px; border: 1px solid var(--border-strong); border-radius: 8px; font: inherit; background: var(--surface); color: var(--text); }
  .kv-row .kv-del-btn { flex: 0 0 auto; padding: 6px 9px; color: var(--muted); }
  .kv-row .kv-del-btn:hover { color: var(--text); }
  .kv-row .kv-key { flex: 0 1 110px; min-width: 70px; }
  .kv-row .kv-val { flex: 1 1 160px; min-width: 100px; }
  .kv-msg { flex-basis: 100%; font-size: 12px; color: #b91c1c; }
  .kv-add-row { margin-top: 4px; }
  .pv-block { border: 1px solid var(--border); border-radius: var(--radius-card); margin-bottom: 16px; padding: 18px 20px; background: var(--surface); scroll-margin-top: 14px; }
  /* Fixed jump-nav header (not sticky-in-scroll; it's a flex sibling above the
     scrollable body, so it never scrolls away). */
  .pv-nav {
    flex: 0 0 auto;
    display: flex; flex-wrap: wrap; gap: 4px;
    padding: 11px 20px; background: var(--bg); border-bottom: 1px solid var(--border);
  }
  .pv-nav-btn {
    border: none; background: transparent; color: var(--muted);
    font-size: 12px; font-weight: 600; padding: 4px 10px; border-radius: 999px;
  }
  .pv-nav-btn:hover { background: var(--hairline); color: var(--text); }
  /* Role groups: a labeled band over the member cards, hairline-separated so
     the preview reads as 참고/예시/검증 sections, not one flat list. */
  .pv-group { scroll-margin-top: 14px; }
  .pv-group + .pv-group { margin-top: 28px; }
  .pv-group-head { margin: 0 2px 12px; }
  .pv-group-title { margin: 0; font-size: 13px; font-weight: 700; letter-spacing: 0.03em; color: var(--muted); }
  .pv-block h3 { font-size: 15px; font-weight: 650; letter-spacing: -0.01em; margin: 0 0 12px; text-transform: capitalize; }
  .pv-hint { font-size: 12px; color: var(--muted); margin: 0 0 8px; }
  .pv-color-row { display: flex; align-items: center; gap: 8px; margin: 6px 0; }
  .pv-color-label { min-width: 72px; font-size: 12px; text-transform: capitalize; color: var(--muted); }
  .pv-color-col { flex: 1; min-width: 0; }
  /* Checkerboard behind swatches so alpha colors (#RRGGBBAA) read as transparent;
     opaque swatches cover it fully, so solid ramps look unchanged. */
  .pv-color-strip {
    display: flex; border-radius: 8px; overflow: hidden; border: 1px solid var(--border);
    background-image: linear-gradient(45deg, #c8ccd2 25%, transparent 25%), linear-gradient(-45deg, #c8ccd2 25%, transparent 25%),
      linear-gradient(45deg, transparent 75%, #c8ccd2 75%), linear-gradient(-45deg, transparent 75%, #c8ccd2 75%);
    background-size: 12px 12px; background-position: 0 0, 0 6px, 6px -6px, -6px 0;
  }
  .pv-color-swatch { flex: 1; height: 36px; }
  .pv-color-caption-row { display: flex; margin-top: 2px; }
  .pv-color-caption { flex: 1; font-size: 12px; text-align: center; color: var(--muted-2); font-variant-numeric: tabular-nums; }
  .pv-type-row { display: flex; align-items: baseline; gap: 10px; margin: 6px 0; border-top: 1px solid var(--hairline); padding-top: 6px; }
  .pv-type-row:first-of-type { border-top: none; padding-top: 0; }
  .pv-type-label { min-width: 72px; font-size: 12px; color: var(--muted); flex-shrink: 0; font-variant-numeric: tabular-nums; }
  /* Big samples (48/60px) must not spill past the card — truncate cleanly
     instead of hard-clipping mid-glyph with a scrollbar. */
  .pv-type-line { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; min-width: 0; flex: 1 1 auto; }
  .pv-space-row { display: flex; align-items: center; gap: 8px; margin: 5px 0; }
  .pv-space-label { min-width: 72px; font-size: 12px; color: var(--muted); flex-shrink: 0; font-variant-numeric: tabular-nums; }
  .pv-space-bar { height: 14px; background: var(--accent); border-radius: 2px; min-width: 1px; }
  .pv-flex-wrap { display: flex; flex-wrap: wrap; gap: 14px; }
  .pv-item { display: flex; flex-direction: column; align-items: center; gap: 4px; }
  .pv-item-label { font-size: 12px; color: var(--muted); font-variant-numeric: tabular-nums; }
  .pv-radius-box { width: 44px; height: 44px; background: var(--accent); }
  .pv-border-box { width: 44px; height: 44px; background: var(--surface); border-color: var(--accent); }
  .pv-shadow-box { width: 44px; height: 44px; background: var(--surface); border-radius: 6px; }
  .pv-opacity-block .pv-flex-wrap { padding: 8px; border-radius: 6px;
    background-image: linear-gradient(45deg, #ccc 25%, transparent 25%), linear-gradient(-45deg, #ccc 25%, transparent 25%),
      linear-gradient(45deg, transparent 75%, #ccc 75%), linear-gradient(-45deg, transparent 75%, #ccc 75%);
    background-size: 14px 14px; background-position: 0 0, 0 7px, 7px -7px, -7px 0; }
  .pv-opacity-box { width: 44px; height: 44px; background: var(--accent); border-radius: 6px; }
  .pv-motion-row { margin: 8px 0; border-top: 1px solid var(--hairline); padding-top: 8px; }
  .pv-motion-row:first-of-type { border-top: none; padding-top: 0; }
  .pv-motion-row-label { font-size: 12px; color: var(--muted); margin-bottom: 6px; }
  .pv-motion-cells { display: flex; flex-wrap: wrap; gap: 16px; }
  .pv-motion-cell { display: flex; flex-direction: column; align-items: flex-start; gap: 4px; width: 130px; overflow: hidden; }
  .pv-motion-box { width: 30px; height: 30px; border-radius: 6px; background: var(--accent); transform: translateX(0); }
  .pv-motion-box:hover, .pv-motion-box.playing { transform: translateX(84px); }
  @media (prefers-reduced-motion: reduce) {
    .pv-motion-box { transition-duration: 0ms !important; }
  }
  .export-filename { min-width: 160px; font-weight: 600; font-size: 12px; }
  .export-pre {
    flex-basis: 100%; white-space: pre-wrap; word-break: break-all; max-height: 240px;
    overflow: auto; background: var(--surface-sunken); border: 1px solid var(--border); border-radius: var(--radius-ctl);
    padding: 12px 14px; font-size: 12px; margin: 8px 0 0;
    font-family: var(--font-mono); line-height: 1.55; font-variant-numeric: tabular-nums;
  }
  .export-all-row { padding: 8px 0; border-top: 1px solid var(--hairline); margin-top: 4px; }
  .import-row { flex-direction: column; align-items: flex-start; }
  .import-note { margin: 4px 0 0; }
  button {
    font: inherit; cursor: pointer; border: 1px solid var(--btn-border); background: var(--btn-bg);
    color: var(--text); border-radius: var(--radius-ctl); padding: 7px 14px;
    display: inline-flex; align-items: center; gap: 6px;
    transition: background-color .13s ease, border-color .13s ease, transform .04s ease;
  }
  button:hover { background: var(--btn-hover); }
  button:active:not(:disabled) { background: var(--btn-active); transform: translateY(1px); }
  button:disabled { opacity: 0.5; cursor: not-allowed; }
  button:disabled:hover { background: var(--btn-bg); }
  /* Unified input box: number + text share one style (number inputs used to
     fall back to the browser default). Spinners removed so both read alike. */
  input[type="text"], input[type="number"] {
    font: inherit; padding: 6px 10px; border: 1px solid var(--border-strong);
    border-radius: 8px; background: var(--surface); color: var(--text);
  }
  input[type="number"] { -moz-appearance: textfield; appearance: textfield; }
  input[type="number"]::-webkit-inner-spin-button,
  input[type="number"]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
  button:focus-visible, input:focus-visible, [tabindex]:focus-visible {
    outline: 2px solid var(--accent); outline-offset: 2px;
  }
  .dirty {
    display: inline-block; padding: 1px 6px; font-size: 12px;
    border-radius: 999px; background: #fde68a; color: #713f12; font-weight: 600;
  }
  .clean {
    display: inline-block; padding: 1px 6px; font-size: 12px;
    border-radius: 999px; color: var(--muted); font-weight: 600;
  }
  .badge-pass, .badge-fail {
    display: inline-flex; align-items: center; gap: 4px; padding: 2px 8px; border-radius: 999px;
    font-size: 12px; font-weight: 600;
  }

      }, [moduleTitle(groupKey)]);
      return btn;
    });
    return [el('div', { class: 'mod-tabs', role: 'tablist' }, tabs), panel];
  }

  // A category is now itself a collapsible <details> (default closed), whose
  // <summary> is the category header and whose body holds the module
  // <details> (2-level nesting). Open/close persistence works unchanged:
  // captureUIState scans document.querySelectorAll('details[id]') globally, so
  // the category <details id="cat-*"> is captured/restored alongside the
  // module <details> inside it. categoryHeaderExtras feeds the summary and
  // MUST be non-interactive (no interactive content in <summary> — see the
  // groupResetBtn precedent); categoryBodyTop is the first body row (the
  // plugin's interactive category master lives here, not in the summary).
  function renderCategory(cat, cfg, defaultOpen) {
    var headerExtra = categoryHeaderExtras(cat.key, cfg);
    var summaryChildren = [el('span', { class: 'category-title', text: cat.name })]
      .concat(headerExtra ? [headerExtra] : []);
    var summary = el('summary', { class: 'category-header' }, summaryChildren);

    var moduleNodes;
    if (moduleLayout === 'tabs') {
      moduleNodes = renderTabbedModules(cat, cfg);
    } else {
      moduleNodes = cat.modules.map(function (groupKey) {
        var extra = moduleExtras(groupKey, cfg);
        var moduleNode = renderModule(groupKey, cfg);
        var rowChildren = (extra ? [extra] : []).concat([moduleNode]);
        return el('div', { class: 'module-row' }, rowChildren);
      });
    }

    var bodyTop = categoryBodyTop(cat.key, cfg);
    var bodyExtra = categoryBodyExtras(cat.key, cfg);
    var bodyChildren = (bodyTop ? [bodyTop] : []).concat(moduleNodes);
    if (bodyExtra) bodyChildren.push(bodyExtra);
    var body = el('div', { class: 'category-body' }, bodyChildren);

    return el('details', detailsAttrs('cat-' + cat.key, !!defaultOpen, 'category'), [summary, body]);
  }

  // ---- Responsive Edit | Preview tab bar (narrow viewports only) ---------
  // On wide screens both columns show side-by-side and .app-tabs is CSS-
  // hidden. On narrow screens (plugin) only the active pane shows and this
  // segmented control switches between them. activeTab persists across the
  // full-rebuild render() the same way detailsOpenState does; switching tabs
  // is a pure view toggle (no store write), so it updates #app's data-tab and
  // the buttons' aria-selected in place rather than triggering a re-render.
  var activeTab = 'edit'; // 'edit' | 'preview'
  function setActiveTab(id) {
    activeTab = id;
    var a = document.getElementById('app');
    if (a) a.setAttribute('data-tab', id);
    var tabs = document.querySelectorAll('.app-tab');
    for (var i = 0; i < tabs.length; i++) {
      tabs[i].setAttribute('aria-selected', tabs[i].getAttribute('data-tab') === id ? 'true' : 'false');
    }
  }
  function renderAppTabs() {
    function tab(id, label) {

        type: 'button', class: 'app-tab', role: 'tab', 'data-tab': id,
        'aria-selected': activeTab === id ? 'true' : 'false',
        text: label,
        onclick: function () { setActiveTab(id); }
      });
    }
    return el('div', { class: 'app-tabs', role: 'tablist', 'aria-label': 'Edit / Preview' },
      [tab('edit', 'Edit'), tab('preview', 'Preview')]);
  }

  // ---- Live preview panel (right column) --------------------------------
  // Read-only: every renderer below derives its output purely from
  // store.get() (and C.buildAllRamps for color), never writes to the store,
  // and contains no focusable controls — so it cannot interfere with the

  var TYPE_SAMPLE = '다람쥐 헌 쳇바퀴에 타고파 Ag 123';

  function renderColorPreview(cfg, ramps) {
    var rows = cfg.color.order.map(function (hue) {
      var steps = Object.keys(ramps[hue]);
      var swatches = steps.map(function (step) {
        var hex = ramps[hue][step];
        return el('div', { class: 'pv-color-swatch', id: 'pv-swatch-' + hue + '-' + step, style: 'background:' + hex, title: hue + ' ' + step + ' ' + hex });
      });

      });

  }

  function renderTypePreview(cfg) {

      var line = el('div', {

  function renderSpacingPreview(cfg) {

  function renderRadiusPreview(cfg) {

      var box = el('div', { class: 'pv-radius-box', style: 'border-radius:' + val });

    });
    return el('div', { class: 'pv-block' }, [el('h3', { text: 'Radius' }), el('div', { class: 'pv-flex-wrap' }, items)]);
  }

  function renderBorderPreview(cfg) {
    var items = Object.keys(cfg.borderWidth).map(function (key) {
      var val = cfg.borderWidth[key];
      var box = el('div', { class: 'pv-border-box', style: 'border-style:solid;border-width:' + val });
      return el('div', { class: 'pv-item' }, [box, el('div', { class: 'pv-item-label', text: key + ' / ' + val })]);
    });
    return el('div', { class: 'pv-block' }, [el('h3', { text: 'Border width' }), el('div', { class: 'pv-flex-wrap' }, items)]);
  }

  function renderShadowPreview(cfg) {
    var items = Object.keys(cfg.shadow).map(function (key) {
      var val = cfg.shadow[key];
      var box = el('div', { class: 'pv-shadow-box', style: 'box-shadow:' + val });
      return el('div', { class: 'pv-item' }, [box, el('div', { class: 'pv-item-label', text: key })]);
    });
    return el('div', { class: 'pv-block' }, [el('h3', { text: 'Shadow' }), el('div', { class: 'pv-flex-wrap' }, items)]);
  }

  function renderOpacityPreview(cfg) {
    var items = Object.keys(cfg.opacity).map(function (key) {
      var val = cfg.opacity[key];
      var box = el('div', { class: 'pv-opacity-box', style: 'opacity:' + val });
      return el('div', { class: 'pv-item' }, [box, el('div', { class: 'pv-item-label', text: key + ' / ' + val })]);
    });
    return el('div', { class: 'pv-block pv-opacity-block' }, [el('h3', { text: 'Opacity' }), el('div', { class: 'pv-flex-wrap' }, items)]);
  }

  // Motion demo: transition duration/easing come from the live config via
  // inline `transition`, so any store change is reflected without extra
  // wiring. Trigger is CSS :hover (no store write) plus an optional "Play
  // all" button that toggles a class briefly — not an autoplay loop.
  function renderMotionPreview(cfg) {
    var reduceMotion = !!(window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches);
    var durationKeys = Object.keys(cfg.duration);
    var easingKeys = Object.keys(cfg.easing);
    var boxRefs = [];
    var maxMs = durationKeys.reduce(function (max, k) { return Math.max(max, parseFloat(cfg.duration[k]) || 0); }, 0);

    var rows = durationKeys.map(function (dKey) {
      var dVal = cfg.duration[dKey];
      var cells = easingKeys.map(function (eKey) {
        var eVal = cfg.easing[eKey];
        var box = el('div', {
          class: 'pv-motion-box',
          style: 'transition:transform ' + dVal + ' ' + eVal + ';',
          title: dKey + ' (' + dVal + ') / ' + eKey
        });
        boxRefs.push(box);
        return el('div', { class: 'pv-motion-cell' }, [box, el('div', { class: 'pv-item-label', text: eKey })]);
      });
      return el('div', { class: 'pv-motion-row' }, [
        el('div', { class: 'pv-motion-row-label', text: dKey + ' / ' + dVal }),
        el('div', { class: 'pv-motion-cells' }, cells)
      ]);
    });

    var playBtn = el('button', {
      type: 'button', text: 'Play all',
      onclick: function () {
        boxRefs.forEach(function (box) { box.classList.add('playing'); });
        setTimeout(function () {
          boxRefs.forEach(function (box) { box.classList.remove('playing'); });
        }, reduceMotion ? 0 : maxMs + 300);
      }
    });

    return el('div', { class: 'pv-block' }, [
      el('h3', { text: 'Motion' }),
      el('p', { class: 'pv-hint', text: 'Hover a box, or press Play all (respects reduced-motion).' }),
      playBtn
    ].concat(rows));
  }

  // Preview sections in render order; ids double as scroll anchors and the
  // labels drive the sticky jump-nav so the two never drift out of sync.
  var PREVIEW_SECTIONS = [
    ['pv-color', 'Color'], ['pv-type', 'Type'], ['pv-spacing', 'Spacing'],
    ['pv-radius', 'Radius'], ['pv-border', 'Border'], ['pv-shadow', 'Shadow'],
    ['pv-opacity', 'Opacity'], ['pv-motion', 'Motion'], ['pv-a11y', 'A11y']
  ];

  // Preview sections grouped by token DOMAIN, mirroring the left control
  // categories 1:1 (Color, Typography, Spacing & Sizing, Effects, Motion) so
  // editing a category and reading its preview line up by name; Accessibility
  // is preview-only. The jump-nav and the on-page group headers both come from
  // this one list.
  var PREVIEW_GROUPS = [
    { id: 'pvg-color', label: 'Color', sections: ['pv-color'] },
    { id: 'pvg-typography', label: 'Typography', sections: ['pv-type'] },
    { id: 'pvg-spacing', label: 'Spacing & Sizing', sections: ['pv-spacing', 'pv-radius', 'pv-border'] },
    { id: 'pvg-effects', label: 'Effects', sections: ['pv-shadow', 'pv-opacity'] },
    { id: 'pvg-motion', label: 'Motion', sections: ['pv-motion'] },
    { id: 'pvg-a11y', label: 'Accessibility', sections: ['pv-a11y'] }
  ];

  // Scroll ONLY the preview body, never bubble to the document root:
  // scrollIntoView() would also scroll every ancestor (dragging the toolbar/
  // left column with it), so compute the offset by hand.
  function scrollPreviewTo(id) {
    var container = document.getElementById('preview-col');
    var t = document.getElementById(id);
    if (!container || !t) return;
    var top = container.scrollTop + (t.getBoundingClientRect().top - container.getBoundingClientRect().top);
    container.scrollTo({ top: top, behavior: 'smooth' });
  }

  // Jump-nav header (fixed above the scrollable body): one button per group.
  function renderPreviewNav() {
    var btns = PREVIEW_GROUPS.map(function (g) {
      return el('button', {
        type: 'button', class: 'pv-nav-btn',
        onclick: function () { scrollPreviewTo(g.id); }
      }, [g.label]);
    });
    return el('nav', { class: 'pv-nav', 'aria-label': 'Preview sections' }, btns);
  }

  function renderPreview(cfg) {
    var ramps = C.buildAllRamps(cfg);
    var nodes = [
      renderColorPreview(cfg, ramps),
      renderTypePreview(cfg),
      renderSpacingPreview(cfg),
      renderRadiusPreview(cfg),
      renderBorderPreview(cfg),
      renderShadowPreview(cfg),
      renderOpacityPreview(cfg),
      renderMotionPreview(cfg)
    ];
    // Tag the first 8 blocks with their anchor ids (A11y/contrast is appended
    // by the caller and tagged there, keeping PREVIEW_SECTIONS the sole order).
    nodes.forEach(function (n, i) { n.id = PREVIEW_SECTIONS[i][0]; });
    return nodes;
  }

  // ---- Live WCAG AA contrast validation panel (read-only) ----------------
  // Renders C.contrastReport(store.get()) as-is; no contrast math lives here.
  // Status is always conveyed as text + icon (never color alone), per the
  // color-blind-safe requirement — this tool must not fail its own audit.
  function contrastStepBadge(stepStr) {
    var passed = stepStr !== '—'; // en-dash sentinel from contrastReport
    return el('span', { class: passed ? 'badge-pass' : 'badge-fail' },
      [passed ? ('✓ Pass (' + stepStr + ')') : '✕ None']);
  }

  function contrastWarnRow(message) {
    return el('tr', { class: 'contrast-warn-row' }, [
      el('td', { colspan: '3' }, [
        el('div', { class: 'contrast-warn', role: 'alert' }, ['⚠ ' + message])
      ])
    ]);
  }

  function renderContrastPanel(cfg) {
    var report = C.contrastReport(cfg);
    var headerRow = el('tr', {}, [
      el('th', { text: 'Palette' }),
      el('th', { text: 'Min AA-pass step on white' }),
      el('th', { text: 'Max AA-pass step on black' })
    ]);
    var bodyRows = [];
    report.forEach(function (r) {
      bodyRows.push(el('tr', {}, [
        el('td', { class: 'contrast-hue-cell', text: r.hue }),
        el('td', {}, [contrastStepBadge(r.whiteMinStep)]),
        el('td', {}, [contrastStepBadge(r.blackMaxStep)])
      ]));
      if (r.whiteMinStep === '—') {
        bodyRows.push(contrastWarnRow(
          r.hue + ': 이 hue는 흰 배경 본문 대비를 통과하는 단계가 없습니다 — 채도/명도를 낮춰보세요.'
        ));
      }
      if (r.blackMaxStep === '—') {
        bodyRows.push(contrastWarnRow(
          r.hue + ': 이 hue는 검은 배경 본문 대비를 통과하는 단계가 없습니다 — 채도/명도를 조정해보세요.'
        ));
      }
    });
    var table = el('table', { class: 'contrast-table' }, [
      el('thead', {}, [headerRow]),
      el('tbody', {}, bodyRows)
    ]);
    return el('div', { class: 'pv-block' }, [
      el('h3', { text: 'Accessibility (WCAG AA 4.5:1)' }),
      el('p', { class: 'pv-hint', text: '각 hue에서 흰 배경 대비 본문 텍스트로 안전한 최소 단계, 검은 배경(다크) 대비 최소 단계.' }),
      table
    ]);
  }
  // ---- Global toolbar: state visibility (heuristic #1) + undo/redo/reset
  // (heuristic #3). Rebuilt every render() alongside #app so its dirty
  // indicator and undo/redo disabled-state never go stale.
  function renderToolbarContent() {
    var dirty = store.isDirty();
    var dirtyBadge = dirty
      ? el('span', { class: 'dirty', id: 'toolbar-dirty', text: '● Modified' })
      : el('span', { class: 'clean', id: 'toolbar-dirty', text: 'Default' });
    var titleGroup = el('div', { class: 'toolbar-title-group' }, [
      el('h1', { text: 'Foundations Token Studio' }),
      dirtyBadge
    ]);

    var undoAttrs = {
      type: 'button', id: 'btn-undo', 'aria-label': 'Undo (Ctrl/Cmd+Z)',
      onclick: function () { store.undo(); }
    };
    if (!store.canUndo()) undoAttrs.disabled = 'disabled';
    var redoAttrs = {
      type: 'button', id: 'btn-redo', 'aria-label': 'Redo (Ctrl/Cmd+Shift+Z)',
      onclick: function () { store.redo(); }
    };
    if (!store.canRedo()) redoAttrs.disabled = 'disabled';
    var resetAllBtn = el('button', {
      type: 'button', id: 'btn-reset-all',
      'aria-label': 'Reset all values to defaults',
      onclick: function () {
        if (window.confirm('모든 값을 기본값으로 되돌릴까요? 이 작업은 "되돌리기"로 복구할 수 있습니다.')) {
          store.resetAll();
        }
      }
    }, iconLabel('reset', 'Reset all'));

    var actions = el('div', { class: 'toolbar-actions' }, [
      el('button', undoAttrs, iconLabel('undo', 'Undo')),
      el('button', redoAttrs, iconLabel('redo', 'Redo')),
      resetAllBtn
    ]);

    return [titleGroup, actions];
  }
  // ---- Cross-cutting state capture/restore around the full-rebuild render() -
  // Three independent pieces of transient UI state must all survive an
  // innerHTML='' + rebuild together: focus/caret (pre-existing), which
  // <details> are open, and how far the two scroll columns are scrolled.
  // They are captured from the live (pre-rebuild) DOM in one pass and
  // restored in one pass after the new DOM is appended, so they compose
  // instead of racing each other.
  function captureUIState() {
    var act = document.activeElement;
    var savedId = act && act.id;
    var ss = null, se = null;
    try { ss = act.selectionStart; se = act.selectionEnd; } catch (e) {}

    document.querySelectorAll('details[id]').forEach(function (d) {
      detailsOpenState[d.id] = d.open;
    });

    var leftEl = document.getElementById('panel-col');
    var rightEl = document.getElementById('preview-col');

    return {
      savedId: savedId, ss: ss, se: se,
      leftScroll: leftEl ? leftEl.scrollTop : 0,
      rightScroll: rightEl ? rightEl.scrollTop : 0
    };
  }

  function restoreUIState(state) {
    var leftEl = document.getElementById('panel-col');
    var rightEl = document.getElementById('preview-col');
    if (leftEl) leftEl.scrollTop = state.leftScroll;
    if (rightEl) rightEl.scrollTop = state.rightScroll;

    var focusId = state.savedId || pendingFocusId;
    if (focusId) {
      var n = document.getElementById(focusId);
      if (n) {
        // preventScroll: the scrollTop we just restored above must win — a
        // plain focus() would scroll the column to bring the field into view
        // and undo the restored position.
        try { n.focus({ preventScroll: true }); } catch (e) { n.focus(); }
        if (state.savedId && state.ss != null && n.setSelectionRange) {
          try { n.setSelectionRange(state.ss, state.se); } catch (e) {}
        }
      }
    }
    pendingFocusId = null;
  }
  // ---- Master-detail (web shell): domain selector + one domain at a time ----
  // Layout has no visual preview (z-index/breakpoint are abstract), so it gets
  // a plain value readout; Accessibility has no settings (it's derived from
  // Color), so its contrast table rides along in the Color domain (a11y:true).
  function renderLayoutPreview(cfg) {
    function section(title, obj) {
      var rows = Object.keys(obj).map(function (k) {
        return el('div', { class: 'pv-space-row' }, [
          el('div', { class: 'pv-space-label', text: k }),
          el('div', { class: 'pv-kv-val', text: String(obj[k]) })
        ]);
      });
      return [el('h3', { text: title })].concat(rows);
    }
    var kids = section('Z-index', cfg.zIndex)
      .concat([el('div', { class: 'pv-sub-gap' })])
      .concat(section('Breakpoint', cfg.breakpoint));
    return el('div', { class: 'pv-block', id: 'pv-layout' }, kids);
  }

  // A comprehensive accessibility view (its own domain, split out from Color):
  // per hue, the representative pass step at AA (4.5:1) and AAA (7:1) on both a
  // white and a black background. Steps are derived live via C.contrastRatio.
  function renderAccessibilityView(cfg) {
    var ramps = C.buildAllRamps(cfg);
    // Step names are arbitrary now, so pick by ORDER: 'first' = lightest passing
    // (white bg), 'last' = darkest passing (black bg).
    function passStep(ramp, bg, thr, pick) {
      var p = Object.keys(ramp).filter(function (s) { return C.contrastRatio(ramp[s], bg) >= thr; });
      if (!p.length) return null;
      return pick === 'first' ? p[0] : p[p.length - 1];
    }
    function cell(step) {
      return el('td', {}, [step == null
        ? el('span', { class: 'badge-fail' }, ['✕ None'])
        : el('span', { class: 'badge-pass' }, ['✓ ' + step])]);
    }
    var head = el('tr', {}, ['Palette', 'White · AA', 'White · AAA', 'Black · AA', 'Black · AAA']
      .map(function (t) { return el('th', { text: t }); }));
    var rows = cfg.color.order.map(function (hue) {
      var r = ramps[hue];
      return el('tr', {}, [
        el('td', { class: 'contrast-hue-cell', text: hue }),
        cell(passStep(r, '#FFFFFF', 4.5, 'first')),
        cell(passStep(r, '#FFFFFF', 7, 'first')),
        cell(passStep(r, '#000000', 4.5, 'last')),
        cell(passStep(r, '#000000', 7, 'last'))
      ]);
    });
    var table = el('table', { class: 'contrast-table' }, [el('thead', {}, [head]), el('tbody', {}, rows)]);
    return el('div', { class: 'pv-block a11y-block' }, [
      el('h3', { text: 'Accessibility (WCAG contrast)' }),
      el('p', { class: 'pv-hint', text: '대비 기준 — 본문(작은 텍스트): AA 4.5:1, AAA 7:1. 큰 텍스트(18px 이상 또는 14px 볼드): AA 3:1, AAA 4.5:1.' }),
      el('p', { class: 'pv-hint', text: '숫자 = 각 배경에서 본문으로 통과하는 대표 단계 (흰 배경 = 가장 밝은 통과 단계, 검은 배경 = 가장 어두운 통과 단계).' }),
      table
    ]);
  }

  var DOMAINS = [
    { key: 'color', label: 'Color', category: 'color', preview: ['pv-color'] },
    { key: 'typography', label: 'Typography', category: 'typography', preview: ['pv-type'] },
    { key: 'spacing', label: 'Spacing & Sizing', category: 'spacing', preview: ['pv-spacing', 'pv-radius', 'pv-border'] },
    { key: 'effects', label: 'Effects', category: 'effects', preview: ['pv-shadow', 'pv-opacity'] },
    { key: 'motion', label: 'Motion', category: 'motion', preview: ['pv-motion'] },
    { key: 'layout', label: 'Layout', category: 'layout', preview: ['pv-layout'] },
    { key: 'a11y', label: 'Accessibility', full: 'a11y' },
    { key: 'export', label: 'Export', full: 'export' }
  ];
  function domainByKey(k) { for (var i = 0; i < DOMAINS.length; i++) if (DOMAINS[i].key === k) return DOMAINS[i]; return null; }
  function categoryByKey(k) { for (var i = 0; i < CATEGORIES.length; i++) if (CATEGORIES[i].key === k) return CATEGORIES[i]; return null; }
  function setActiveDomain(key) { activeDomain = key; render(); }

  function renderDomainNav() {
    var btns = DOMAINS.map(function (d) {
      return el('button', {
        type: 'button', class: 'domain-tab' + (d.key === 'export' ? ' domain-tab-export' : ''),
        role: 'tab', 'aria-selected': d.key === activeDomain ? 'true' : 'false',
        onclick: function () { setActiveDomain(d.key); }
      }, [d.label]);
    });
    return el('nav', { class: 'domain-nav', role: 'tablist', 'aria-label': 'Domain' }, btns);
  }

  function renderMasterDetailBody(cfg, extrasArr) {
    app.appendChild(renderDomainNav());
    var domain = domainByKey(activeDomain) || DOMAINS[0];

    // Full-width, preview-/output-only domains (no paired settings pane):
    // Accessibility (derived from Color) and Export.
    if (domain.full) {
      var content = domain.full === 'export' ? extrasArr : [renderAccessibilityView(cfg)];
      var fullCol = el('div', { class: 'preview-col' },
        [el('div', { class: 'preview-body', id: 'preview-col' }, content)]);
      app.appendChild(el('div', { class: 'app-body app-body-single' }, [fullCol]));
      return;
    }

    var byId = {};
    renderPreview(cfg).forEach(function (n) { byId[n.id] = n; });
    var blocks = [];
    domain.preview.forEach(function (id) {
      blocks.push(id === 'pv-layout' ? renderLayoutPreview(cfg) : byId[id]);
    });
    var previewCol = el('div', { class: 'preview-col' },
      [el('div', { class: 'preview-body', id: 'preview-col' }, blocks.filter(Boolean))]);

    var settings = renderTabbedModules(categoryByKey(domain.category), cfg);
    var panelCol = el('div', { class: 'panel-col', id: 'panel-col' }, settings);

    app.appendChild(el('div', { class: 'app-body' }, [previewCol, panelCol]));
  }

  function render() {
    var cfg = store.get();
    var uiState = captureUIState();

    toolbarNode.innerHTML = '';
    renderToolbarContent().forEach(function (n) { toolbarNode.appendChild(n); });

    app.innerHTML = '';

    // rightColumnExtras(cfg) supplies shell-specific DOM (web: export/import
    // section; plugin: range+Apply) — may return a single Node, an array of
    // Nodes, or null/undefined. This preserves the exact append position the
    // export section used to occupy here (end of the LEFT/panel column,
    // after the KV list panels) — NOT the right/preview column — so moving
    // this call behind the seam does not shift anything on screen.
    var extras = rightColumnExtras(cfg);
    var extrasArr = extras == null ? [] : (Array.isArray(extras) ? extras : [extras]);

    if (layout === 'master-detail') {
      renderMasterDetailBody(cfg, extrasArr);
      restoreUIState(uiState);
      return;
    }

    var leftCol = el('div', { class: 'panel-col', id: 'panel-col' },
      CATEGORIES.map(function (cat, i) { return renderCategory(cat, cfg, i === 0); }).concat(extrasArr));

    var contrastBlock = renderContrastPanel(cfg);
    contrastBlock.id = PREVIEW_SECTIONS[PREVIEW_SECTIONS.length - 1][0]; // pv-a11y
    // Distribute the flat preview blocks into their role groups (each group is
    // a labeled <section> that also serves as the jump-nav anchor).
    var byId = {};
    renderPreview(cfg).concat([contrastBlock]).forEach(function (n) { byId[n.id] = n; });
    var groupEls = PREVIEW_GROUPS.map(function (g) {
      var head = el('div', { class: 'pv-group-head' }, [el('h2', { class: 'pv-group-title', text: g.label })]);
      var members = g.sections.map(function (sid) { return byId[sid]; }).filter(Boolean);
      return el('section', { class: 'pv-group', id: g.id }, [head].concat(members));
    });
    // Preview column = a NON-scrolling flex wrapper holding a fixed nav header
    // over a scrollable body. The body keeps id="preview-col" (the scroll
    // element captureUIState/restoreUIState track, and the anchor scroll
    // target), so the nav can't scroll away the way a sticky child did.
    var previewBody = el('div', { class: 'preview-body', id: 'preview-col' }, groupEls);
    var rightCol = el('div', { class: 'preview-col' }, [renderPreviewNav(), previewBody]);

    // #app is a flex column: a tab bar (shown only on narrow viewports via
    // CSS) over an .app-body grid that holds the two columns. data-tab drives
    // which column shows when narrow; when wide, CSS ignores it and shows
    // both. activeTab is re-applied here so a full rebuild keeps the current
    // pane selected.
    var appBody = el('div', { class: 'app-body' }, [leftCol, rightCol]);
    app.appendChild(renderAppTabs());
    app.appendChild(appBody);
    app.setAttribute('data-tab', activeTab);

    restoreUIState(uiState);
  }

  // Global undo/redo shortcuts (heuristic #3). Registered once (not inside
  // render()) so re-renders never pile up duplicate listeners. This ALWAYS
  // drives store.undo()/redo(), even when a text/number field is focused, and
  // never defers to native in-field undo. Rationale: this is a
  // single-document state app where every editable control commits to the
  // store on each keystroke, so store history is already keystroke-granular;
  // meanwhile native field undo is non-functional here because render() does
  // app.innerHTML='' + rebuild on every commit, so the focused input is a
  // fresh node with an EMPTY native undo stack. Deferring to the browser
  // would undo nothing AND suppress app undo — undo would be dead while
  // editing. Global store undo (design-canvas model) is the correct behavior.
  document.addEventListener('keydown', function (e) {
    var key = e.key ? e.key.toLowerCase() : '';
    if (!(e.ctrlKey || e.metaKey) || key !== 'z') return;
    e.preventDefault();
    if (e.shiftKey) store.redo(); else store.undo();
  });

    store.subscribe(render);
    // NOTE: the INITIAL render() call is deliberately NOT made here (it was
    // in earlier drafts of this factory, mirroring the pre-refactor single
    // IIFE). Calling render() synchronously inside createStudio() would
    // invoke rightColumnExtras(cfg) (e.g. the web shell's renderExportSection)
    // before createStudio() has even returned — i.e. before the caller's
    // `var el = studio.el;` (and `detailsAttrs = studio.detailsAttrs;`) can
    // possibly run, since those lines are the NEXT statement after the
    // `createStudio(...)` call completes. Any rightColumnExtras callback that
    // itself needs the shared `el`/`detailsAttrs` helpers (as the web export
    // section does) would crash on the very first paint. Shells MUST call
    // the returned `render()` themselves, once, after wiring up el/
    // detailsAttrs from the return value — subsequent renders are already
    // wired via store.subscribe(render) above and need no shell involvement.
    //
    // detailsAttrs is exposed alongside {render, el} (beyond the minimal
    // {render, el} shape) because rightColumnExtras-supplied <details>
    // elements (e.g. the web shell's export/import section) need the SAME
    // open/closed persistence as every factory-rendered group: captureUIState
    // above scans document.querySelectorAll('details[id]') globally (so it
    // already captures shell-owned ids too), but the shell has no other way
    // to read that captured state back into its own detailsAttrs(id, ...)
    // calls without this export — omitting it would silently make the
    // shell's own <details> forget their open state on every keystroke.
    return { render: render, el: el, detailsAttrs: detailsAttrs };
  }

  var StudioUI = { createStudio: createStudio };
  root.StudioUI = StudioUI;
  if (typeof module !== 'undefined' && module.exports) module.exports = StudioUI;
})(typeof window !== 'undefined' ? window : globalThis);
</script>
<script>
// ---- Web shell: wires core/studio-ui.js createStudio() to this page,
// and owns the export/import section (web-shell-only UI, supplied to
// createStudio() via rightColumnExtras). ----
(function () {
  'use strict';
  var C = window.TokenCore;
  var store = C.createStore();
  var app = document.getElementById('app');
  var toolbarNode = document.getElementById('toolbar');
  var studio = window.StudioUI.createStudio({
    C: C, store: store, appEl: app, toolbarEl: toolbarNode,
    rightColumnExtras: renderExportSection,
    moduleLayout: 'tabs', // web shell: depth-2 modules as tabs, not accordion
    layout: 'master-detail' // web shell: domain selector, preview+settings per domain
  });
  var el = studio.el;
  var detailsAttrs = studio.detailsAttrs;
  window.Studio = { store: store, C: C, el: el, render: studio.render };

  // ---- Export panel (download / copy / preview) + tokens.json round-trip --
  // The four artifacts are produced by calling the frozen exporters
  // (C.toDTCG/toCSS/toTailwind/toFigma) unchanged, so downloaded files stay
  // byte-identical to the golden parity output. This section only reads the
  // store, except for the round-trip file loader, which is the sole writer
  // (via store.loadConfig).
  //
  // This whole section is web-shell-only: it is passed to createStudio() as
  // rightColumnExtras and rendered once per Studio render() (see
  // renderExportSection below), same as it always was — the shared factory
  // in core/studio-ui.js knows nothing about export/import.
  function download(filename, text, mime) {
    var blob = new Blob([text], { type: mime || 'text/plain' });
    var url = URL.createObjectURL(blob);
    var a = document.createElement('a');
    a.href = url; a.download = filename;
    document.body.appendChild(a); a.click(); a.remove();
    URL.revokeObjectURL(url);
  }

  var EXPORT_SPECS = [
    { key: 'dtcg', label: 'tokens.json (DTCG)', filename: 'tokens.json', mime: 'application/json', fn: C.toDTCG },
    { key: 'css', label: 'tokens.css', filename: 'tokens.css', mime: 'text/css', fn: C.toCSS },
    { key: 'tailwind', label: 'tailwind.preset.js', filename: 'tailwind.preset.js', mime: 'text/javascript', fn: C.toTailwind },
    { key: 'figma', label: 'tokens.figma.json', filename: 'tokens.figma.json', mime: 'application/json', fn: C.toFigma }
  ];

  function downloadAllExports(cfg) {
    EXPORT_SPECS.forEach(function (spec) { download(spec.filename, spec.fn(cfg), spec.mime); });
  }

  function showTimedMessage(msgEl, text, ok) {
    msgEl.textContent = text;
    msgEl.style.color = ok ? '#166534' : '#b91c1c';
    if (msgEl._msgTimer) clearTimeout(msgEl._msgTimer);
    msgEl._msgTimer = setTimeout(function () { msgEl.textContent = ''; }, 3500);
  }

  // Copy = navigator.clipboard.writeText, with a fallback that selects the
  // <pre> text (clipboard API may be unavailable under file://).
  function copyExportText(text, pre, msgEl) {
    function selectFallback() {
      try {
        // The <pre> may live inside a COLLAPSED <details> (display:none), in
        // which case Range/execCommand operate on unrendered content and copy
        // nothing (yet execCommand can still return true — a false success).
        // Open the disclosure first so the text is actually rendered (and
        // visible to the user) before selecting.
        var d = pre.closest && pre.closest('details');
        if (d) d.open = true;
        var range = document.createRange();
        range.selectNodeContents(pre);
        var sel = window.getSelection();
        sel.removeAllRanges();
        sel.addRange(range);
        var copied = false;
        // Only treat an explicit `true` as success; a false/unknown result
        // means the browser did not copy — never report a false "복사됨".
        try { copied = document.execCommand && document.execCommand('copy') === true; } catch (e) { copied = false; }
        showTimedMessage(msgEl, copied ? '복사됨' : '텍스트를 선택했습니다. Cmd/Ctrl+C로 복사하세요.', copied);
      } catch (e) {
        showTimedMessage(msgEl, '복사에 실패했습니다. 미리보기를 열고 직접 선택 후 Cmd/Ctrl+C로 복사하세요.', false);
      }
    }
    if (navigator.clipboard && navigator.clipboard.writeText) {
      navigator.clipboard.writeText(text).then(function () {
        showTimedMessage(msgEl, '복사됨', true);
      }, selectFallback);
    } else {
      selectFallback();
    }
  }

  function renderExportArtifactRow(cfg, spec) {
    var text = spec.fn(cfg);
    var pre = el('pre', { class: 'export-pre' }, [text]);
    // role="status" already implies a polite live region; aria-live="polite"
    // alongside it is redundant.
    var msg = el('span', { class: 'kv-msg', role: 'status' });
    var copyBtn = el('button', {
      type: 'button', text: 'Copy',
      onclick: function () { copyExportText(text, pre, msg); }
    });
    var downloadBtn = el('button', {
      type: 'button', text: 'Download',
      onclick: function () { download(spec.filename, text, spec.mime); }
    });
    var previewId = 'grp-export-preview-' + spec.key;
    var details = el('details', detailsAttrs(previewId, false), [el('summary', { text: 'Preview' }), pre]);
    return el('div', { class: 'kv-row' }, [
      el('span', { class: 'export-filename', text: spec.label }),
      copyBtn, downloadBtn, msg, details
    ]);
  }

  // ---- Round-trip: tokens.json -> config -------------------------------
  // Pure (no DOM). Restores ONLY the directly-stored groups plus
  // color.base — color ramps are generated from H/Cpk params and are never
  // reverse-engineered from hex. Never throws: JSON.parse errors and
  // wrong-shape leaves are reported via the returned `error`/`skipped`
  // fields instead.
  function extractDTCGGroup(node) {
    if (!node || typeof node !== 'object' || Array.isArray(node)) return null;
    var keys = Object.keys(node);
    if (!keys.length) return null;
    var out = {};
    for (var i = 0; i < keys.length; i++) {
      var k = keys[i];
      var leaf = node[k];
      if (!leaf || typeof leaf !== 'object' || Array.isArray(leaf) ||
          !Object.prototype.hasOwnProperty.call(leaf, '$value')) {
        return null;
      }
      out[k] = leaf.$value;
    }
    return out;
  }

  var DTCG_DIRECT_GROUPS = ['space', 'radius', 'borderWidth', 'opacity', 'shadow',
    'zIndex', 'breakpoint', 'duration', 'easing', 'lineHeight', 'letterSpacing'];
  var DTCG_FONT_GROUPS = { family: 'fontFamily', size: 'fontSize', weight: 'fontWeight' };

  function configFromDTCG(jsonText, currentCfg) {
    var data;
    try {
      data = JSON.parse(jsonText);
    } catch (e) {
      return { config: null, error: 'JSON 파싱에 실패했습니다: ' + e.message, note: null, skipped: [] };
    }
    if (!data || typeof data !== 'object' || Array.isArray(data)) {
      return { config: null, error: '올바른 tokens.json 형식이 아닙니다 (최상위는 객체여야 합니다).', note: null, skipped: [] };
    }

    var merged = C.cloneConfig(currentCfg);
    var restored = [];
    var skipped = [];

    DTCG_DIRECT_GROUPS.forEach(function (key) {
      if (!(key in data)) return;
      var g = extractDTCGGroup(data[key]);
      if (g) { merged[key] = g; restored.push(key); } else { skipped.push(key); }
    });

    if (data.font && typeof data.font === 'object' && !Array.isArray(data.font)) {
      Object.keys(DTCG_FONT_GROUPS).forEach(function (dtcgKey) {
        if (!(dtcgKey in data.font)) return;
        var g = extractDTCGGroup(data.font[dtcgKey]);
        var cfgKey = DTCG_FONT_GROUPS[dtcgKey];
        if (g) { merged[cfgKey] = g; restored.push(cfgKey); } else { skipped.push('font.' + dtcgKey); }
      });
    }

    if (data.color && typeof data.color === 'object' && !Array.isArray(data.color) && ('base' in data.color)) {
      var baseGroup = extractDTCGGroup(data.color.base);
      if (baseGroup) { merged.color.base = baseGroup; restored.push('color.base'); } else { skipped.push('color.base'); }
    }

    if (!restored.length) {
      return { config: null, error: 'tokens.json에서 복원 가능한 항목을 찾지 못했습니다. 형식을 확인해주세요.', note: null, skipped: skipped };
    }

    return {
      config: merged,
      error: null,
      note: '컬러 램프는 파라미터에서 생성되므로 tokens.json에서 역복원하지 않습니다.',
      skipped: skipped
    };
  }
  window.Studio.configFromDTCG = configFromDTCG;

  // Import status is kept outside studio.render() (which fully rebuilds the
  // DOM on every store change) so the success/error note survives the
  // rebuild triggered by store.loadConfig. It must NOT survive an UNRELATED
  // store change though (e.g. the user tweaks a slider after importing) — a
  // stale "불러오기 완료" banner sitting there while nothing about it changed
  // would violate heuristic #1 (state visibility must reflect current
  // reality). importJustHappened is set true immediately before each
  // studio.render() call that is part of the import flow itself (both the
  // direct calls below and the store.loadConfig(...)-triggered one via
  // subscribe), and is read once then reset to false at the top of every
  // renderExportSection() call — renderExportSection runs exactly once per
  // Studio render (as rightColumnExtras), so this is equivalent to the old
  // read-then-reset-at-the-top-of-render() — so any render NOT caused by an
  // import silently clears importStatus.
  var importStatus = null;
  var importJustHappened = false;

  function renderExportSection(cfg) {
    if (!importJustHappened) importStatus = null;
    importJustHappened = false;

    var rows = EXPORT_SPECS.map(function (spec) { return renderExportArtifactRow(cfg, spec); });
    var allBtn = el('button', {
      type: 'button', text: 'Download all',
      onclick: function () { downloadAllExports(store.get()); }
    });
    var allRow = el('div', { class: 'export-all-row' }, [allBtn]);

    var fileInput = el('input', {
      type: 'file', accept: '.json,application/json', id: 'ctl-import-file',
      onchange: function (e) {
        var input = e.target;
        var file = input.files && input.files[0];
        input.value = '';
        if (!file) return;
        var reader = new FileReader();
        reader.onload = function () {
          try {
            var text = typeof reader.result === 'string' ? reader.result : '';
            var result = configFromDTCG(text, store.get());
            if (result.error) {
              importStatus = { ok: false, text: result.error };
              importJustHappened = true;
              studio.render();
            } else {
              var skippedNote = result.skipped.length ? (' (건너뜀: ' + result.skipped.join(', ') + ')') : '';
              importStatus = { ok: true, text: '불러오기 완료. ' + result.note + skippedNote };
              importJustHappened = true;
              store.loadConfig(result.config); // triggers studio.render() via subscribe
            }
          } catch (err) {
            importStatus = { ok: false, text: '불러오는 중 오류가 발생했습니다: ' + (err && err.message ? err.message : String(err)) };
            importJustHappened = true;
            studio.render();
          }
        };
        reader.onerror = function () {
          importStatus = { ok: false, text: '파일을 읽는 중 오류가 발생했습니다.' };
          importJustHappened = true;
          studio.render();
        };
        reader.readAsText(file);
      }
    });
    var fileLabel = el('label', { for: 'ctl-import-file', text: 'Load tokens.json: ' });
    var importRow = el('div', { class: 'kv-row import-row' }, [fileLabel, fileInput]);

    var noteEl = el('p', {
      class: 'pv-hint import-note',
      text: '컬러 램프는 파라미터에서 생성되므로 tokens.json에서 역복원하지 않습니다. 나머지 항목(타이포/스페이스/라디우스 등)만 복원됩니다.'
    });
    // role="alert" already implies an assertive live region; aria-live is redundant.
    var statusEl = el('div', { class: 'kv-msg', role: 'alert' });
    if (importStatus) {
      statusEl.textContent = importStatus.text;
      statusEl.style.color = importStatus.ok ? '#166534' : '#b91c1c';
    }

    // Rendered in the same borderless category-disclosure language as the six
    // editing categories (Color/Type/...) so the left panel reads as one clean
    // list; the `category-export` modifier adds a hairline above to mark it as
    // the output section rather than a 7th editing category.
    return el('details', detailsAttrs('grp-export', false, 'category category-export'), [
      el('summary', { class: 'category-header' }, [el('span', { class: 'category-title', text: 'Export' })]),
      el('div', { class: 'category-body kv-group-body' }, rows.concat([allRow, importRow, noteEl, statusEl]))
    ]);
  }

  // Kick off the first paint now that el/detailsAttrs are wired up (see
  // the NOTE in core/studio-ui.js createStudio() for why this can't
  // happen inside the factory itself when rightColumnExtras is supplied).
  studio.render();
}());
</script>
</body>
