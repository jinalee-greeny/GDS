<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Foundations Token Studio</title>
<style>/*__STUDIO_CSS__*/</style>
</head>
<body>
<div id="toolbar"></div>
<div id="app"></div>

<script id="token-core">
/*__TOKEN_CORE__*/
</script>
<script id="studio-ui">
/*__STUDIO_UI__*/
</script>
<script>
// ---- Web shell: wires core/studio-ui.js createStudio() to this page,
// and owns the export/import section (web-shell-only UI, supplied to
// createStudio() via rightColumnExtras). ----
(function () {
  'use strict';
  var C = window.TokenCore;
  var store = C.createStore();
  var app = document.getElementById('app');
  var toolbarNode = document.getElementById('toolbar');
  var studio = window.StudioUI.createStudio({
    C: C, store: store, appEl: app, toolbarEl: toolbarNode,
    rightColumnExtras: renderExportSection
  });
  var el = studio.el;
  var detailsAttrs = studio.detailsAttrs;
  window.Studio = { store: store, C: C, el: el, render: studio.render };

  // ---- Export panel (download / copy / preview) + tokens.json round-trip --
  // The four artifacts are produced by calling the frozen exporters
  // (C.toDTCG/toCSS/toTailwind/toFigma) unchanged, so downloaded files stay
  // byte-identical to the golden parity output. This section only reads the
  // store, except for the round-trip file loader, which is the sole writer
  // (via store.loadConfig).
  //
  // This whole section is web-shell-only: it is passed to createStudio() as
  // rightColumnExtras and rendered once per Studio render() (see
  // renderExportSection below), same as it always was — the shared factory
  // in core/studio-ui.js knows nothing about export/import.
  function download(filename, text, mime) {
    var blob = new Blob([text], { type: mime || 'text/plain' });
    var url = URL.createObjectURL(blob);
    var a = document.createElement('a');
    a.href = url; a.download = filename;
    document.body.appendChild(a); a.click(); a.remove();
    URL.revokeObjectURL(url);
  }

  var EXPORT_SPECS = [
    { key: 'dtcg', label: 'tokens.json (DTCG)', filename: 'tokens.json', mime: 'application/json', fn: C.toDTCG },
    { key: 'css', label: 'tokens.css', filename: 'tokens.css', mime: 'text/css', fn: C.toCSS },
    { key: 'tailwind', label: 'tailwind.preset.js', filename: 'tailwind.preset.js', mime: 'text/javascript', fn: C.toTailwind },
    { key: 'figma', label: 'tokens.figma.json', filename: 'tokens.figma.json', mime: 'application/json', fn: C.toFigma }
  ];

  function downloadAllExports(cfg) {
    EXPORT_SPECS.forEach(function (spec) { download(spec.filename, spec.fn(cfg), spec.mime); });
  }

  function showTimedMessage(msgEl, text, ok) {
    msgEl.textContent = text;
    msgEl.style.color = ok ? '#166534' : '#b91c1c';
    if (msgEl._msgTimer) clearTimeout(msgEl._msgTimer);
    msgEl._msgTimer = setTimeout(function () { msgEl.textContent = ''; }, 3500);
  }

  // Copy = navigator.clipboard.writeText, with a fallback that selects the
  // <pre> text (clipboard API may be unavailable under file://).
  function copyExportText(text, pre, msgEl) {
    function selectFallback() {
      try {
        // The <pre> may live inside a COLLAPSED <details> (display:none), in
        // which case Range/execCommand operate on unrendered content and copy
        // nothing (yet execCommand can still return true — a false success).
        // Open the disclosure first so the text is actually rendered (and
        // visible to the user) before selecting.
        var d = pre.closest && pre.closest('details');
        if (d) d.open = true;
        var range = document.createRange();
        range.selectNodeContents(pre);
        var sel = window.getSelection();
        sel.removeAllRanges();
        sel.addRange(range);
        var copied = false;
        // Only treat an explicit `true` as success; a false/unknown result
        // means the browser did not copy — never report a false "복사됨".
        try { copied = document.execCommand && document.execCommand('copy') === true; } catch (e) { copied = false; }
        showTimedMessage(msgEl, copied ? '복사됨' : '텍스트를 선택했습니다. Cmd/Ctrl+C로 복사하세요.', copied);
      } catch (e) {
        showTimedMessage(msgEl, '복사에 실패했습니다. 미리보기를 열고 직접 선택 후 Cmd/Ctrl+C로 복사하세요.', false);
      }
    }
    if (navigator.clipboard && navigator.clipboard.writeText) {
      navigator.clipboard.writeText(text).then(function () {
        showTimedMessage(msgEl, '복사됨', true);
      }, selectFallback);
    } else {
      selectFallback();
    }
  }

  function renderExportArtifactRow(cfg, spec) {
    var text = spec.fn(cfg);
    var pre = el('pre', { class: 'export-pre' }, [text]);
    // role="status" already implies a polite live region; aria-live="polite"
    // alongside it is redundant.
    var msg = el('span', { class: 'kv-msg', role: 'status' });
    var copyBtn = el('button', {
      type: 'button', text: 'Copy',
      onclick: function () { copyExportText(text, pre, msg); }
    });
    var downloadBtn = el('button', {
      type: 'button', text: 'Download',
      onclick: function () { download(spec.filename, text, spec.mime); }
    });
    var previewId = 'grp-export-preview-' + spec.key;
    var details = el('details', detailsAttrs(previewId, false), [el('summary', { text: 'Preview' }), pre]);
    return el('div', { class: 'kv-row' }, [
      el('span', { class: 'export-filename', text: spec.label }),
      copyBtn, downloadBtn, msg, details
    ]);
  }

  // ---- Round-trip: tokens.json -> config -------------------------------
  // Pure (no DOM). Restores ONLY the directly-stored groups plus
  // color.base — color ramps are generated from H/Cpk params and are never
  // reverse-engineered from hex. Never throws: JSON.parse errors and
  // wrong-shape leaves are reported via the returned `error`/`skipped`
  // fields instead.
  function extractDTCGGroup(node) {
    if (!node || typeof node !== 'object' || Array.isArray(node)) return null;
    var keys = Object.keys(node);
    if (!keys.length) return null;
    var out = {};
    for (var i = 0; i < keys.length; i++) {
      var k = keys[i];
      var leaf = node[k];
      if (!leaf || typeof leaf !== 'object' || Array.isArray(leaf) ||
          !Object.prototype.hasOwnProperty.call(leaf, '$value')) {
        return null;
      }
      out[k] = leaf.$value;
    }
    return out;
  }

  var DTCG_DIRECT_GROUPS = ['space', 'radius', 'borderWidth', 'opacity', 'shadow',
    'zIndex', 'breakpoint', 'duration', 'easing', 'lineHeight', 'letterSpacing'];
  var DTCG_FONT_GROUPS = { family: 'fontFamily', size: 'fontSize', weight: 'fontWeight' };

  function configFromDTCG(jsonText, currentCfg) {
    var data;
    try {
      data = JSON.parse(jsonText);
    } catch (e) {
      return { config: null, error: 'JSON 파싱에 실패했습니다: ' + e.message, note: null, skipped: [] };
    }
    if (!data || typeof data !== 'object' || Array.isArray(data)) {
      return { config: null, error: '올바른 tokens.json 형식이 아닙니다 (최상위는 객체여야 합니다).', note: null, skipped: [] };
    }

    var merged = C.cloneConfig(currentCfg);
    var restored = [];
    var skipped = [];

    DTCG_DIRECT_GROUPS.forEach(function (key) {
      if (!(key in data)) return;
      var g = extractDTCGGroup(data[key]);
      if (g) { merged[key] = g; restored.push(key); } else { skipped.push(key); }
    });

    if (data.font && typeof data.font === 'object' && !Array.isArray(data.font)) {
      Object.keys(DTCG_FONT_GROUPS).forEach(function (dtcgKey) {
        if (!(dtcgKey in data.font)) return;
        var g = extractDTCGGroup(data.font[dtcgKey]);
        var cfgKey = DTCG_FONT_GROUPS[dtcgKey];
        if (g) { merged[cfgKey] = g; restored.push(cfgKey); } else { skipped.push('font.' + dtcgKey); }
      });
    }

    if (data.color && typeof data.color === 'object' && !Array.isArray(data.color) && ('base' in data.color)) {
      var baseGroup = extractDTCGGroup(data.color.base);
      if (baseGroup) { merged.color.base = baseGroup; restored.push('color.base'); } else { skipped.push('color.base'); }
    }

    if (!restored.length) {
      return { config: null, error: 'tokens.json에서 복원 가능한 항목을 찾지 못했습니다. 형식을 확인해주세요.', note: null, skipped: skipped };
    }

    return {
      config: merged,
      error: null,
      note: '컬러 램프는 파라미터에서 생성되므로 tokens.json에서 역복원하지 않습니다.',
      skipped: skipped
    };
  }
  window.Studio.configFromDTCG = configFromDTCG;

  // Import status is kept outside studio.render() (which fully rebuilds the
  // DOM on every store change) so the success/error note survives the
  // rebuild triggered by store.loadConfig. It must NOT survive an UNRELATED
  // store change though (e.g. the user tweaks a slider after importing) — a
  // stale "불러오기 완료" banner sitting there while nothing about it changed
  // would violate heuristic #1 (state visibility must reflect current
  // reality). importJustHappened is set true immediately before each
  // studio.render() call that is part of the import flow itself (both the
  // direct calls below and the store.loadConfig(...)-triggered one via
  // subscribe), and is read once then reset to false at the top of every
  // renderExportSection() call — renderExportSection runs exactly once per
  // Studio render (as rightColumnExtras), so this is equivalent to the old
  // read-then-reset-at-the-top-of-render() — so any render NOT caused by an
  // import silently clears importStatus.
  var importStatus = null;
  var importJustHappened = false;

  function renderExportSection(cfg) {
    if (!importJustHappened) importStatus = null;
    importJustHappened = false;

    var rows = EXPORT_SPECS.map(function (spec) { return renderExportArtifactRow(cfg, spec); });
    var allBtn = el('button', {
      type: 'button', text: 'Download all',
      onclick: function () { downloadAllExports(store.get()); }
    });
    var allRow = el('div', { class: 'export-all-row' }, [allBtn]);

    var fileInput = el('input', {
      type: 'file', accept: '.json,application/json', id: 'ctl-import-file',
      onchange: function (e) {
        var input = e.target;
        var file = input.files && input.files[0];
        input.value = '';
        if (!file) return;
        var reader = new FileReader();
        reader.onload = function () {
          try {
            var text = typeof reader.result === 'string' ? reader.result : '';
            var result = configFromDTCG(text, store.get());
            if (result.error) {
              importStatus = { ok: false, text: result.error };
              importJustHappened = true;
              studio.render();
            } else {
              var skippedNote = result.skipped.length ? (' (건너뜀: ' + result.skipped.join(', ') + ')') : '';
              importStatus = { ok: true, text: '불러오기 완료. ' + result.note + skippedNote };
              importJustHappened = true;
              store.loadConfig(result.config); // triggers studio.render() via subscribe
            }
          } catch (err) {
            importStatus = { ok: false, text: '불러오는 중 오류가 발생했습니다: ' + (err && err.message ? err.message : String(err)) };
            importJustHappened = true;
            studio.render();
          }
        };
        reader.onerror = function () {
          importStatus = { ok: false, text: '파일을 읽는 중 오류가 발생했습니다.' };
          importJustHappened = true;
          studio.render();
        };
        reader.readAsText(file);
      }
    });
    var fileLabel = el('label', { for: 'ctl-import-file', text: 'Load tokens.json: ' });
    var importRow = el('div', { class: 'kv-row import-row' }, [fileLabel, fileInput]);

    var noteEl = el('p', {
      class: 'pv-hint import-note',
      text: '컬러 램프는 파라미터에서 생성되므로 tokens.json에서 역복원하지 않습니다. 나머지 항목(타이포/스페이스/라디우스 등)만 복원됩니다.'
    });
    // role="alert" already implies an assertive live region; aria-live is redundant.
    var statusEl = el('div', { class: 'kv-msg', role: 'alert' });
    if (importStatus) {
      statusEl.textContent = importStatus.text;
      statusEl.style.color = importStatus.ok ? '#166534' : '#b91c1c';
    }

    return el('details', detailsAttrs('grp-export', false, 'group'), [
      el('summary', { text: 'Export' }),
      el('div', { class: 'group-body kv-group-body' }, rows.concat([allRow, importRow, noteEl, statusEl]))
    ]);
  }

  // Kick off the first paint now that el/detailsAttrs are wired up (see
  // the NOTE in core/studio-ui.js createStudio() for why this can't
  // happen inside the factory itself when rightColumnExtras is supplied).
  studio.render();
}());
</script>
</body>
</html>
